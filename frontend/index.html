<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Everything App</title>
</head>
<body>
<style>
  :root{
    --paper:#F6F5F1;
    --surface:#FFFFFF;
    --ink:#1B1E23;
    --ink-soft:#4B5157;
    --muted:#5B6067;
    --border:#E4E1DA;
    --border-soft:#EDEBE5;
    --tag-bg:#EEEDE7;
    --tag-ink:#565B52;
    --accent:#2954FF;
    --accent-soft:#E7EBFF;
    --accent2:#A67C2E;
    --accent2-soft:#F3ECDD;
    --like:#B5433A;
    --topbar-bg:rgba(246,245,241,0.94);
    --hover-bg:#FCFCFA;
    --radius:8px;
    --shell-width:550px;      /* Social/News column width, once space allows */
    --shell-width-wide:670px; /* Streaming column width, once space allows */
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  .feedapp{
    background:var(--paper);
    color:var(--ink);
    min-height:100%;
    display:flex;
    justify-content:center;
    padding:0 0 60px 0;
    transition:background .15s ease, color .15s ease;
  }
  html, body{
    margin:0;
    min-height:100%;
    background:var(--paper);
  }
  html[data-theme="dark"]{
    --paper:#000000;
    --surface:#121212;
    --ink:#F2F2F2;
    --ink-soft:#C7C7C7;
    --muted:#8A8A8A;
    --border:#2A2A2A;
    --border-soft:#1E1E1E;
    --tag-bg:#1C1C1C;
    --tag-ink:#B5B5B5;
    --accent:#6690FF;
    --accent-soft:#1A2440;
    --accent2:#D3A15A;
    --accent2-soft:#2C2519;
    --like:#E0685D;
    --topbar-bg:rgba(0,0,0,0.92);
    --hover-bg:#161616;
  }
  .feedapp ::selection{background:var(--accent-soft);}

  /* ---------- app layout: sidebar + shell ---------- */
  /* .applayout's own size is driven directly off the same --shell-width
     vars (not left to shrink-to-fit auto-sizing) — some browsers don't
     reliably re-run an ancestor's intrinsic-size calc when only a
     descendant's width changes via class toggle, which left the row
     visibly stuck at the old width when switching tabs. It animates via
     flex-basis (not width) for the same reason .shell does below — width
     transitions on flex items are unreliable, flex-basis isn't. Keeping
     flex-shrink:1 so it still shrinks gracefully on narrow viewports. */
  .applayout{
    display:flex;
    align-items:flex-start;
    gap:28px;
    padding:20px 14px 0 14px;
    flex:0 1 calc(210px + 28px + var(--shell-width) + 28px + 210px + 28px);
    min-width:0;
    transition:flex-basis .18s ease;
  }
  .applayout.wide{flex-basis:calc(210px + 28px + var(--shell-width-wide) + 28px + 210px + 28px);}
  .sidebar{
    width:210px;
    flex:none;
    position:sticky;
    top:20px;
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  /* empty for now — balances the left sidebar's width so the shell stays
     visually centered on the page instead of drifting right */
  .sidebar-right{width:210px;flex:none;}
  .sidebar-brand{
    display:flex;
    align-items:center;
    gap:7px;
    font-weight:800;
    font-size:16px;
    letter-spacing:0.2px;
    color:var(--ink);
    white-space:nowrap;
    padding:8px 10px 20px 10px;
  }
  .sidebar-brand .brand-mark{
    width:11px;height:11px;border-radius:2px;
    background:var(--accent);
    transform:rotate(45deg);
    flex:none;
  }
  .sidebar-settings{position:relative;}
  .sidebar-settings-btn{
    display:flex;
    align-items:center;
    gap:11px;
    width:100%;
    background:none;
    border:none;
    padding:10px;
    border-radius:8px;
    font-size:14px;
    font-weight:600;
    color:var(--ink-soft);
    cursor:pointer;
    text-align:left;
    transition:background .12s ease, color .12s ease;
  }
  .sidebar-settings-btn:hover{background:var(--hover-bg);color:var(--ink);}
  .sidebar-settings-btn svg{width:19px;height:19px;flex:none;}
  .sidebar-backdrop{display:none;}
  .menu-btn{
    display:none;
    align-items:center;justify-content:center;
    width:30px;height:30px;border-radius:7px;flex:none;
    background:var(--surface);border:1px solid var(--border);
    color:var(--muted);cursor:pointer;
    margin-bottom:10px;
  }
  .menu-btn:hover{color:var(--ink);border-color:var(--accent);}
  .menu-btn svg{width:16px;height:16px;}

  @media (max-width: 900px){
    .applayout{padding:12px 14px 0 14px;}
    .sidebar-right{display:none;}
    .sidebar{
      position:fixed;
      top:0;left:0;bottom:0;
      width:250px;
      background:var(--surface);
      border-right:1px solid var(--border);
      padding:16px 10px;
      transform:translateX(-100%);
      transition:transform .2s ease;
      z-index:90;
      overflow-y:auto;
    }
    .sidebar.open{transform:translateX(0);}
    .sidebar-backdrop{
      display:block;
      position:fixed;inset:0;
      background:rgba(8,8,8,0.5);
      z-index:89;
      opacity:0;
      pointer-events:none;
      transition:opacity .2s ease;
    }
    .sidebar-backdrop.open{opacity:1;pointer-events:auto;}
    .menu-btn{display:flex;}
    /* sidebars are out of flow (drawer / hidden) here, so shell is the
       only flex item left — fall back to fluid width */
    .applayout, .applayout.wide{flex-basis:100%;}
    .shell, .applayout.wide .shell{flex-basis:100%;}
  }

  .shell{
    /* animating flex-basis (not width) — width transitions on flex items
       are unreliable across browsers since the flex algorithm recomputes
       the item's used size from its basis each frame; flex-basis is the
       property actually meant to be animated for flex-item sizing. */
    flex:0 1 var(--shell-width);
    min-width:0;
    display:flex;
    flex-direction:column;
    transition:flex-basis .18s ease;
  }
  .applayout.wide .shell{flex-basis:var(--shell-width-wide);}

  /* ---------- top bar ---------- */
  .topbar{
    position:sticky;
    top:0;
    z-index:20;
    background:var(--topbar-bg);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--border);
    padding:12px 14px 0 14px;
  }
  .search-combo{
    flex:1;
    position:relative;
    min-width:0;
  }
  .search-icon{
    position:absolute;left:9px;top:50%;transform:translateY(-50%);
    width:12px;height:12px;color:var(--muted);pointer-events:none;
    z-index:1;
  }
  .search-field{
    display:flex;
    align-items:center;
    gap:6px;
    width:100%;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:7px;
    padding:5px 8px 5px 28px;
    min-height:30px;
    cursor:text;
    transition:border-color .12s ease, background .12s ease;
  }
  .search-field:focus-within{border-color:var(--accent);background:var(--accent-soft);}
  .search-field input{
    flex:1;
    min-width:50px;
    border:none;
    outline:none;
    background:transparent;
    font-size:12.5px;
    font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;
    color:var(--ink);
    padding:1px 0;
  }
  .search-field input::placeholder{color:var(--muted);}
  .search-tagpill{
    display:flex;
    align-items:center;
    gap:4px;
    background:var(--accent);
    color:#fff;
    font-size:10.5px;
    font-weight:700;
    padding:3px 5px 3px 8px;
    border-radius:100px;
    white-space:nowrap;
    flex:none;
  }
  .search-tagpill button{
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(255,255,255,0.22);
    border:none;
    border-radius:100px;
    width:14px;height:14px;
    color:#fff;
    cursor:pointer;
    padding:0;
    flex:none;
  }
  .search-tagpill button:hover{background:rgba(255,255,255,0.4);}
  .search-tagpill button svg{width:8px;height:8px;}
  .tag-dropdown{
    position:absolute;
    top:calc(100% + 6px);
    left:0;
    right:0;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:9px;
    box-shadow:0 10px 28px rgba(0,0,0,0.14);
    padding:9px;
    z-index:35;
    display:none;
    max-height:220px;
    overflow-y:auto;
  }
  .tag-dropdown.open{display:block;}
  .tag-dropdown-label{
    font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;
    color:var(--muted);margin-bottom:7px;
  }
  .tag-dropdown-grid{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
  }
  .tag-dropdown-item{
    border:1px solid var(--border);
    background:var(--paper);
    color:var(--tag-ink);
    font-size:11px;
    font-weight:600;
    padding:5px 10px;
    border-radius:100px;
    cursor:pointer;
    transition:all .12s ease;
    user-select:none;
  }
  .tag-dropdown-item:hover{border-color:var(--accent);color:var(--ink);}
  .tag-dropdown-item.selected{background:var(--accent);border-color:var(--accent);color:#fff;}
  .count-pill{
    font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;
    font-size:10.5px;
    color:var(--muted);
    white-space:nowrap;
    flex:none;
  }
  .settings-panel{
    position:absolute;top:calc(100% + 4px);left:0;
    background:var(--surface);border:1px solid var(--border);
    border-radius:9px;box-shadow:0 10px 28px rgba(0,0,0,0.14);
    padding:10px;width:190px;z-index:95;
    display:none;
  }
  .settings-panel.open{display:block;}
  .settings-label{
    font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;
    color:var(--muted);margin-bottom:7px;
  }
  .theme-toggle{display:flex;gap:6px;}
  .theme-opt{
    flex:1;text-align:center;padding:7px 0;border-radius:6px;
    border:1px solid var(--border);background:var(--paper);
    color:var(--ink-soft);font-size:11.5px;font-weight:600;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:4px;
  }
  .theme-opt svg{width:14px;height:14px;}
  .theme-opt.active{background:var(--accent);border-color:var(--accent);color:#fff;}

  /* ---------- search row (full width, above tabs) ---------- */
  .search-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 0 9px 0;
  }

  /* ---------- post composer ---------- */
  /* sits below the tabs/subtabs row now — border-top (not -bottom) divides
     it from the nav above; the topbar's own outer border-bottom already
     closes it off from the feed below, so composer needs no border there */
  .composer{
    border-top:1px solid var(--border-soft);
    padding:11px 0 12px 0;
  }
  .composer-collapsed{
    display:flex;
    align-items:center;
    gap:9px;
    cursor:text;
  }
  .composer-avatar{
    width:32px;height:32px;border-radius:100px;object-fit:cover;flex:none;
    background:var(--tag-bg);border:1px solid var(--border-soft);
  }
  .composer-fake-input{
    flex:1;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:100px;
    padding:8px 14px;
    font-size:13px;
    color:var(--muted);
    transition:border-color .12s ease;
  }
  .composer-collapsed:hover .composer-fake-input{border-color:var(--accent);}
  .composer-expanded{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .composer-body{
    width:100%;
    border:1px solid var(--border);
    border-radius:8px;
    background:var(--surface);
    color:var(--ink);
    font-size:13.5px;
    font-family:inherit;
    line-height:1.45;
    padding:10px;
    resize:vertical;
    min-height:56px;
    outline:none;
  }
  .composer-body:focus{border-color:var(--accent);}
  .composer-tags-label{
    display:flex;align-items:center;gap:6px;
    font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;
    color:var(--muted);margin-bottom:7px;
  }
  .composer-tag-count{
    font-size:10.5px;font-weight:700;text-transform:none;letter-spacing:0;
    color:var(--accent);
  }
  .composer-tag-required{
    font-size:10.5px;font-weight:700;text-transform:none;letter-spacing:0;
    color:var(--muted);
  }
  .composer-tags{display:flex;flex-wrap:wrap;gap:6px;}
  .tag-dropdown-item.disabled{opacity:0.35;pointer-events:none;}
  .composer-text-input{
    flex:1;min-width:160px;
    border:1px solid var(--border);
    border-radius:6px;
    background:var(--surface);
    color:var(--ink);
    font-size:12px;
    padding:7px 9px;
    outline:none;
    font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;
    transition:opacity .12s ease, border-color .12s ease;
  }
  .composer-text-input:focus{border-color:var(--accent);}
  .composer-media-picker{
    display:flex;align-items:center;justify-content:center;gap:7px;
    border:1.5px dashed var(--border);
    border-radius:8px;
    padding:14px;
    font-size:12px;
    font-weight:600;
    color:var(--muted);
    cursor:pointer;
    transition:border-color .12s ease, color .12s ease, background .12s ease;
  }
  .composer-media-picker:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
  .composer-media-picker svg{width:15px;height:15px;flex:none;}
  .composer-media-preview{position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--border-soft);background:var(--tag-bg);}
  .composer-media-preview img,
  .composer-media-preview video{width:100%;max-height:260px;object-fit:cover;display:block;background:#000;}
  .composer-media-remove{
    position:absolute;top:7px;right:7px;
    width:24px;height:24px;border-radius:100px;
    background:rgba(20,20,18,0.65);color:#fff;border:none;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
  }
  .composer-media-remove svg{width:10px;height:10px;}
  .composer-media-remove:hover{background:rgba(20,20,18,0.85);}
  .composer-actions{display:flex;justify-content:flex-end;gap:8px;}
  .composer-btn{
    padding:7px 16px;border-radius:100px;font-size:12.5px;font-weight:700;
    cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--ink-soft);
    transition:border-color .12s ease;
  }
  .composer-btn:hover{border-color:var(--accent);}
  .composer-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .composer-btn.primary:disabled{opacity:0.4;cursor:default;}
  .composer-btn.primary:disabled:hover{border-color:var(--accent);}

  /* ---------- repost modal ---------- */
  .modal-overlay{
    position:fixed;inset:0;
    background:rgba(8,8,8,0.6);
    display:none;
    align-items:center;justify-content:center;
    z-index:100;
    padding:20px;
  }
  .modal-overlay.open{display:flex;}
  .modal-dialog{
    background:var(--surface);
    border-radius:12px;
    max-width:440px;
    width:100%;
    max-height:85vh;
    overflow-y:auto;
    padding:16px;
    box-shadow:0 24px 60px rgba(0,0,0,0.35);
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .modal-header{display:flex;align-items:center;justify-content:space-between;}
  .modal-title{font-size:15px;font-weight:800;color:var(--ink);}
  .modal-close{
    display:flex;align-items:center;justify-content:center;
    width:26px;height:26px;border-radius:100px;flex:none;
    background:var(--tag-bg);border:none;color:var(--muted);cursor:pointer;
  }
  .modal-close svg{width:11px;height:11px;}
  .modal-close:hover{color:var(--ink);}
  .repost-preview{
    display:flex;gap:8px;
    border:1px solid var(--border-soft);
    border-radius:8px;
    padding:8px 10px;
    background:var(--paper);
  }
  .repost-preview .avatar{width:28px;height:28px;}
  .repost-preview-body{
    font-size:12px;color:var(--ink-soft);
    margin-top:2px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }

  /* ---------- section tabs ---------- */
  .tabs{
    display:flex;
    gap:2px;
  }
  .tabbtn{
    flex:none;
    background:none;
    border:none;
    cursor:pointer;
    font-size:12.5px;
    font-weight:700;
    color:var(--muted);
    padding:8px 14px 9px 14px;
    border-bottom:2.5px solid transparent;
    display:flex;
    align-items:center;
    gap:6px;
    transition:color .12s ease;
  }
  .tabbtn svg{width:13px;height:13px;}
  .tabbtn:hover{color:var(--ink);}
  .tabbtn.active{
    color:var(--accent);
    border-bottom-color:var(--accent);
  }

  /* ---------- streaming-only sub-tabs (Vids/Livestreams/Shows/Music) ---------- */
  /* no border-bottom here — composer's own border-top is what divides the
     nav (tabs+subtabs) from it now that composer sits below both */
  .subtabs{
    display:none;
    gap:6px;
    padding:8px 14px 10px 14px;
    flex-wrap:wrap;
  }
  .subtabbtn{
    flex:none;
    background:var(--tag-bg);
    border:1px solid transparent;
    cursor:pointer;
    font-size:11.5px;
    font-weight:700;
    color:var(--muted);
    padding:5px 12px;
    border-radius:100px;
    transition:background .12s ease, color .12s ease;
  }
  .subtabbtn:hover{color:var(--ink);}
  .subtabbtn.active{background:var(--accent);color:#fff;}



  /* ---------- feed body wrapper ---------- */
  .feedbody{padding-top:2px;}
  .empty-state{
    padding:50px 20px;
    text-align:center;
    color:var(--muted);
    font-size:13px;
  }
  .empty-state b{color:var(--ink);display:block;font-size:14px;margin-bottom:4px;}

  /* ---------- post row (list) ---------- */
  .post{
    border-bottom:1px solid var(--border-soft);
    background:var(--surface);
    padding:10px 14px 11px 14px;
    animation:fadein .25s ease;
    cursor:pointer;
  }
  .post:hover{background:var(--hover-bg);}
  @keyframes fadein{from{opacity:0;transform:translateY(2px);}to{opacity:1;transform:none;}}
  .post-tags{display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap;}
  .tag-pill{
    font-size:9.5px;font-weight:700;letter-spacing:0.3px;text-transform:uppercase;
    background:var(--tag-bg);color:var(--tag-ink);padding:2.5px 7px;border-radius:4px;
  }
  .post-head{display:flex;align-items:flex-start;gap:8px;}
  .avatar{
    width:32px;height:32px;border-radius:7px;object-fit:cover;flex:none;
    background:var(--tag-bg);border:1px solid var(--border-soft);
  }
  .post-headtext{flex:1;min-width:0;}
  .namerow{display:flex;align-items:baseline;gap:5px;flex-wrap:wrap;}
  .displayname{font-weight:700;font-size:13.5px;color:var(--ink);}
  .handle{font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;font-size:11.5px;color:var(--accent);}
  /* clickable avatar/handle -> profile page, used across posts/embeds/cards */
  [data-user-handle]{cursor:pointer;}
  img[data-user-handle]:hover{opacity:0.85;}
  .namerow[data-user-handle]:hover .displayname{text-decoration:underline;}
  .postdate{font-size:11px;color:var(--muted);margin-top:1px;font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;}
  .post-body{font-size:13.5px;line-height:1.45;color:var(--ink-soft);margin:7px 0 0 0;white-space:pre-wrap;}
  .post-image{margin-top:8px;width:100%;max-height:280px;object-fit:cover;border-radius:7px;border:1px solid var(--border-soft);display:block;}
  .post-video{
    margin-top:8px;
    width:100%;
    max-height:360px;
    border-radius:7px;
    border:1px solid var(--border-soft);
    display:block;
    background:#000;
  }
  .video-title{
    font-size:14.5px;
    font-weight:700;
    color:var(--ink);
    margin-top:8px;
    line-height:1.35;
  }
  .embed .post-video{max-height:200px;margin-top:6px;}
  .embed .video-title{font-size:12.5px;margin-top:6px;}

  /* ---------- video detail page (YouTube-style layout) ---------- */
  .video-detail .video-title{
    font-size:19px;
    margin-top:10px;
  }
  .video-detail-meta{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-top:12px;
  }
  .video-detail-meta .actionbar{margin-top:0;flex:none;gap:20px;}
  .video-detail-meta .actbtn{font-size:13.5px;gap:7px;padding:5px 7px;position:relative;}
  .video-detail-meta .actbtn svg{width:18px;height:18px;}
  .video-detail-meta .actbtn + .actbtn::before{
    content:'';
    position:absolute;
    left:-10px;
    top:50%;
    transform:translateY(-50%);
    width:1px;
    height:14px;
    background:var(--border);
  }

  .actionbar{display:flex;gap:16px;margin-top:8px;}
  .actbtn{
    display:flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;
    color:var(--muted);font-size:11.5px;font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;
    padding:3px 4px;border-radius:5px;transition:color .12s ease;
  }
  .actbtn svg{width:14px;height:14px;transition:transform .15s ease;}
  .actbtn:hover{color:var(--ink);}
  .actbtn.like.active{color:var(--like);}
  .actbtn.like.active svg{fill:var(--like);transform:scale(1.08);}
  .actbtn.repost.active{color:var(--accent2);}
  .actbtn.repost.active svg{transform:rotate(90deg);}

  /* ---------- embedded thread ---------- */
  .embed{margin-top:9px;border-left:2px solid var(--accent);border-radius:0 6px 6px 0;background:var(--accent-soft);padding:8px 10px 9px 10px;cursor:pointer;transition:filter .12s ease;}
  .embed:hover{filter:brightness(0.95);}
  .embed .embed{border-left-color:var(--accent2);background:var(--accent2-soft);}
  .embed .embed .embed{border-left-color:var(--border);background:var(--paper);}
  .embed-flag{display:flex;align-items:center;gap:5px;font-size:9.5px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
  .embed .embed .embed-flag{color:var(--accent2);}
  .embed .embed .embed .embed-flag{color:var(--muted);}
  .embed-flag svg{width:10px;height:10px;}
  .embed .post-tags{margin-bottom:5px;}
  .embed .avatar{width:24px;height:24px;border-radius:6px;}
  .embed .displayname{font-size:12px;}
  .embed .handle{font-size:10.5px;}
  .embed .postdate{font-size:10px;}
  .embed .post-body{font-size:12.5px;margin-top:5px;}
  .embed .post-image{max-height:180px;margin-top:6px;}
  .embed .actionbar{display:none;}

  /* ---------- video-embed: compact "watch streaming video" card ---------- */
  .video-embed-row{display:flex;gap:10px;}
  .video-embed-thumb{
    width:84px;height:52px;border-radius:6px;object-fit:cover;flex:none;
    background:var(--tag-bg);border:1px solid var(--border-soft);
  }
  .video-embed-meta{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:5px;}
  .video-embed-title{
    font-size:12.5px;font-weight:700;color:var(--ink);line-height:1.3;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .video-embed-channel{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
  .video-embed-avatar{width:16px;height:16px;border-radius:100px;object-fit:cover;flex:none;}
  .video-embed-channel .displayname{font-size:10.5px;}
  .video-embed-channel .handle{font-size:10px;}
  .video-embed-channel .postdate{font-size:10px;margin-top:0;}

  .sentinel{height:1px;}
  .loadingrow{padding:16px;text-align:center;color:var(--muted);font-size:11.5px;font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;}

  .toast{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);
    background:#181B22;color:#fff;font-size:12px;padding:9px 16px;border-radius:100px;
    opacity:0;transition:all .25s ease;pointer-events:none;white-space:nowrap;z-index:50;
    box-shadow:0 6px 20px rgba(0,0,0,0.25);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ---------- streaming grid ---------- */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:18px 14px;
    padding:14px;
  }
  .card{
    cursor:pointer;
    animation:fadein .25s ease;
  }
  .card-thumbwrap{
    position:relative;
    border-radius:9px;
    overflow:hidden;
    border:1px solid var(--border-soft);
    background:var(--tag-bg);
  }
  .card-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;transition:transform .2s ease;}
  .card:hover .card-thumb{transform:scale(1.03);}
  .card-tags{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;}
  .card-meta{display:flex;gap:8px;margin-top:8px;}
  .card-avatar{width:30px;height:30px;border-radius:100px;object-fit:cover;flex:none;border:1px solid var(--border-soft);}
  .card-title{font-size:12.8px;font-weight:700;color:var(--ink);line-height:1.32;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .card-sub{font-size:11px;color:var(--muted);margin-top:3px;font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;}

  /* ---------- detail page ---------- */
  .detailwrap{padding:0 0 6px 0;}
  .backbtn{
    display:flex;align-items:center;gap:6px;
    padding:11px 14px;
    font-size:12px;font-weight:700;color:var(--muted);
    cursor:pointer;background:var(--surface);border-bottom:1px solid var(--border-soft);
  }
  .backbtn:hover{color:var(--accent);}
  .backbtn svg{width:13px;height:13px;}
  .detail-post{cursor:default;}
  .detail-post .post-body{font-size:14.5px;}

  /* ---------- user profile page ---------- */
  /* Always rendered, banner or not — a bannerless profile just gets a flat
     --tag-bg rectangle instead of an <img>, so it's the same layout either
     way (see renderProfilePage). The avatar sits in its bottom-left corner
     and hangs slightly past the bottom edge (profile-banner-avatar's
     negative margin-bottom); the handle/name sit to its right, still on
     the image itself. */
  .profile-banner-wrap{
    position:relative;
    width:100%;
    height:190px;
    background:var(--tag-bg);
    border-bottom:1px solid var(--border-soft);
  }
  .profile-banner-img{
    width:100%;height:100%;object-fit:cover;display:block;
  }
  .profile-banner-scrim{
    position:absolute;inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,0) 35%, rgba(0,0,0,0.72) 100%);
    pointer-events:none;
  }
  .profile-banner-overlay{
    position:absolute;left:14px;right:14px;bottom:0;
    display:flex;align-items:flex-end;gap:12px;
  }
  .profile-banner-avatar{
    width:88px;height:88px;border-radius:14px;object-fit:cover;flex:none;
    border:1px solid var(--border-soft);background:var(--tag-bg);
    margin-bottom:-24px; /* overlaps past the banner's bottom edge */
    position:relative;
  }
  .profile-banner-text{padding-bottom:14px;min-width:0;}
  .profile-banner-handle{
    font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;
    font-size:11px;
    color:rgba(255,255,255,0.85);
    text-shadow:0 1px 3px rgba(0,0,0,0.6);
  }
  .profile-banner-name{
    font-size:22px;font-weight:800;color:#fff;line-height:1.3;margin-top:2px;
    text-shadow:0 1px 4px rgba(0,0,0,0.6);
  }
  .profile-hero{padding:8px 14px 18px 14px;}
  /* Reserves space beside the avatar's overlapping bottom sliver (24px,
     matching profile-banner-avatar's overlap) so the verified badge lines
     up to its right instead of sitting underneath it. */
  .profile-hero-topline{display:flex;align-items:center;gap:12px;}
  .profile-avatar-spacer{width:88px;height:24px;flex:none;}
  .profile-verified-badge{display:flex;align-items:center;gap:5px;font-size:13.5px;font-weight:600;color:var(--accent);}
  .profile-verified-badge svg{width:14px;height:14px;flex-shrink:0;}
  .profile-bio{font-size:13.5px;line-height:1.55;color:var(--ink-soft);margin-top:10px;white-space:pre-wrap;}

  .profile-links-section{padding:14px;border-top:1px solid var(--border-soft);}
  .profile-links-title{
    font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;
    color:var(--muted);margin-bottom:10px;
  }
  .profile-links-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
    gap:10px;
  }
  .profile-link-card{
    display:flex;flex-direction:row;align-items:flex-start;gap:10px;
    padding:12px;
    border:1px solid var(--border-soft);
    border-radius:9px;
    background:var(--surface);
    text-decoration:none;
    transition:border-color .12s ease, background .12s ease;
  }
  .profile-link-card:hover{border-color:var(--accent);background:var(--hover-bg);}
  .profile-link-icon{width:20px;height:20px;color:var(--accent);flex:none;margin-top:1px;}
  .profile-link-icon svg{width:100%;height:100%;}
  .profile-link-text{display:flex;flex-direction:column;gap:4px;min-width:0;}
  .profile-link-name{font-size:13px;font-weight:700;color:var(--ink);}
  .profile-link-desc{font-size:11.5px;color:var(--muted);line-height:1.4;}

  /* top/bottom padding only — .profile-posts-list's children (.post/.card)
     already carry their own 14px horizontal padding, matching how they
     look in the main feed; adding it again here would double it up */
  .profile-posts-section{padding:14px 0 0 0;border-top:1px solid var(--border-soft);}
  .profile-posts-toolbar{display:flex;flex-direction:column;gap:10px;padding:0 14px 14px 14px;}
  .profile-posts-typerow{display:flex;gap:6px;flex-wrap:wrap;}
  .profile-filter-pill{
    border:1px solid var(--border);
    background:var(--paper);
    color:var(--tag-ink);
    font-size:11px;
    font-weight:600;
    padding:5px 12px;
    border-radius:100px;
    cursor:pointer;
    transition:all .12s ease;
    user-select:none;
  }
  .profile-filter-pill:hover{border-color:var(--accent);color:var(--ink);}
  .profile-filter-pill.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .profile-posts-searchrow{display:flex;gap:8px;flex-wrap:wrap;}
  .profile-posts-search{
    flex:1;
    min-width:140px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:7px;
    padding:7px 10px;
    font-size:12.5px;
    font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;
    color:var(--ink);
    outline:none;
  }
  .profile-posts-search::placeholder{color:var(--muted);}
  .profile-posts-search:focus{border-color:var(--accent);}
  .profile-posts-select{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:7px;
    padding:7px 8px;
    font-size:11.5px;
    font-weight:600;
    color:var(--ink-soft);
    outline:none;
    cursor:pointer;
  }
  .profile-posts-select:focus{border-color:var(--accent);}
  .profile-posts-list{display:flex;flex-direction:column;}
  .profile-posts-list .card{
    padding:10px 14px 14px 14px;
    border-bottom:1px solid var(--border-soft);
    background:var(--surface);
  }
  .profile-posts-list .card:hover{background:var(--hover-bg);}

  /* ---------- affiliate page ---------- */
  .affiliate-hero{
    position:relative;
    overflow:hidden;
    padding:36px 20px;
    background:linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  }
  .affiliate-hero::before, .affiliate-hero::after{
    content:'';
    position:absolute;
    border-radius:100px;
    filter:blur(36px);
    opacity:0.4;
    background:#fff;
    pointer-events:none;
  }
  .affiliate-hero::before{width:160px;height:160px;top:-60px;right:-30px;}
  .affiliate-hero::after{width:110px;height:110px;bottom:-55px;right:130px;}
  .affiliate-hero-title{
    position:relative;
    font-size:25px;
    font-weight:800;
    line-height:1.25;
    color:#fff;
    max-width:380px;
  }
  .affiliate-hero-sub{
    position:relative;
    font-size:13px;
    line-height:1.5;
    margin-top:9px;
    color:rgba(255,255,255,0.88);
    max-width:380px;
  }
  .affiliate-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
    gap:14px;
    padding:20px;
  }
  .affiliate-card{
    display:flex;
    flex-direction:column;
    gap:10px;
    padding:16px;
    border:1px solid var(--border-soft);
    border-radius:12px;
    background:var(--surface);
  }
  .affiliate-card-icon{
    width:36px;height:36px;flex:none;
    display:flex;align-items:center;justify-content:center;
    border-radius:9px;
    background:var(--accent-soft);
    color:var(--accent);
  }
  .affiliate-card-icon svg{width:19px;height:19px;}
  .affiliate-card-title{font-size:14.5px;font-weight:700;color:var(--ink);}
  .affiliate-card-desc{font-size:12px;line-height:1.55;color:var(--muted);flex:1;}
  .affiliate-card-btn{
    align-self:flex-start;
    background:none;
    border:1px solid var(--border);
    border-radius:100px;
    padding:7px 14px;
    font-size:12px;
    font-weight:700;
    color:var(--accent);
    cursor:pointer;
    transition:border-color .12s ease, background .12s ease;
  }
  .affiliate-card-btn:hover{border-color:var(--accent);background:var(--accent-soft);}
</style>

const API_BASE = "http://localhost:4000/api";

function pickImage(seed){ return `https://picsum.photos/seed/${seed}/640/360`; }
function fmtDate(d){
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + ' · ' +
         d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
}
function tagPills(tags){
  return `<div class="post-tags">${tags.map(t=>`<span class="tag-pill">${t}</span>`).join('')}</div>`;
}

// the API's hosted avatar URLs aren't reliably hotlinkable, so every avatar
// is swapped for the one known-good base64 image client-side (see
// PLACEHOLDER_AVATAR above)
function normalizePost(p){
  if(!p) return null;
  return {
    ...p,
    date: new Date(p.createdAt),
    reposted: false,
    author: {...p.author, avatar: PLACEHOLDER_AVATAR},
    embed: normalizePost(p.embed),
    embedVideo: normalizeEmbedVideo(p.embedVideo)
  };
}

// compact video summary nested inside a post's `embedVideo` (repost of a
// streaming video) — not a full Video, just enough for the watch-card
function normalizeEmbedVideo(v){
  if(!v) return null;
  return {
    ...v,
    date: new Date(v.createdAt),
    channel: {...v.channel, avatar: PLACEHOLDER_AVATAR}
  };
}

function normalizeVideo(v){
  if(!v) return null;
  return {
    ...v,
    date: new Date(v.createdAt),
    channel: {...v.channel, avatar: PLACEHOLDER_AVATAR}
  };
}

function normalizeProfileUser(u){
  if(!u) return null;
  return {...u, avatar: PLACEHOLDER_AVATAR};
}

async function fetchTags(){
  try{
    const res = await fetch(`${API_BASE}/tags`);
    TAGS = await res.json();
  }catch(e){
    console.error(e);
  }
  renderTagDropdown();
  renderComposer();
}

// ---- posts for the current tab/filter, paginated from the API ----
let posts = [];
let nextCursor = null;
let loading = false;
let noMore = false;
let fetchSeq = 0;

async function fetchPosts(reset){
  if(!reset && (loading || noMore)) return;
  const seq = ++fetchSeq;
  if(reset){ posts = []; nextCursor = null; noMore = false; }
  loading = true;
  loadingRow.style.display = 'block';
  renderMain();
  try{
    const params = new URLSearchParams({section: currentTab});
    if(selectedTag) params.set('tag', selectedTag);
    if(searchQuery) params.set('q', searchQuery);
    if(nextCursor) params.set('cursor', nextCursor);
    const res = await fetch(`${API_BASE}/posts?${params}`);
    const data = await res.json();
    if(seq !== fetchSeq) return; // a newer request superseded this one
    posts = posts.concat(data.posts.map(normalizePost));
    nextCursor = data.nextCursor;
    noMore = !nextCursor;
  }catch(e){
    console.error(e);
    if(seq === fetchSeq) showToast('Could not reach the server');
  }finally{
    if(seq === fetchSeq){
      loading = false;
      loadingRow.style.display = 'none';
      renderMain();
    }
  }
}

async function fetchVideos(reset){
  if(!reset && (videoLoading || videoNoMore)) return;
  const seq = ++videoFetchSeq;
  if(reset){ videos = []; videoNextCursor = null; videoNoMore = false; }
  videoLoading = true;
  loadingRow.style.display = 'block';
  renderMain();
  try{
    const params = new URLSearchParams();
    if(selectedTag) params.set('tag', selectedTag);
    if(searchQuery) params.set('q', searchQuery);
    if(videoNextCursor) params.set('cursor', videoNextCursor);
    const res = await fetch(`${API_BASE}/videos?${params}`);
    const data = await res.json();
    if(seq !== videoFetchSeq) return;
    videos = videos.concat(data.videos.map(normalizeVideo));
    videoNextCursor = data.nextCursor;
    videoNoMore = !videoNextCursor;
  }catch(e){
    console.error(e);
    if(seq === videoFetchSeq) showToast('Could not reach the server');
  }finally{
    if(seq === videoFetchSeq){
      videoLoading = false;
      loadingRow.style.display = 'none';
      renderMain();
    }
  }
}

// used by tab-switch, search, and tag-filter handlers so they don't need to
// know which resource the current tab is backed by
function refetchCurrentTab(reset){
  if(currentTab === 'streaming') fetchVideos(reset);
  else fetchPosts(reset);
}

// ---- profile page's own post search — merges Posts and Videos from a
// single author/channel into one sorted, paginated list via the backend's
// GET /users/:handle/posts. Deliberately does NOT go through renderMain():
// the toolbar (search input, tag/sort selects, type pills) is built once
// by renderProfilePage and would lose focus/cursor position if rebuilt on
// every keystroke, so only #profilePostsList is touched here — same reason
// the main feed's search field lives outside the reactive feed body.
function normalizeProfileItem(item){
  return item.type === 'video'
    ? {...normalizeVideo(item), type: 'video'}
    : {...normalizePost(item), type: 'post'};
}
function renderProfileItem(item){
  return item.type === 'video' ? renderCard(item) : renderPost(item);
}
function profilePostsListEl(){
  return document.getElementById('profilePostsList');
}
function renderProfilePostsList(){
  const el = profilePostsListEl();
  if(!el) return; // navigated away before this resolved
  if(profileFilterTypes.size === 0){
    el.innerHTML = `<div class="empty-state"><b>Nothing selected</b>Pick at least one content type above.</div>`;
    return;
  }
  if(!profileItems.length){
    el.innerHTML = profileLoading ? '' : `<div class="empty-state"><b>No posts found</b>Try a different filter or search.</div>`;
    return;
  }
  el.innerHTML = profileItems.map(renderProfileItem).join('');
}

async function fetchProfilePosts(reset){
  if(!detailUser) return;
  if(!reset && (profileLoading || profileNoMore)) return;
  const seq = ++profileFetchSeq;
  if(reset){ profileItems = []; profileOffset = 0; profileNoMore = false; }
  if(profileFilterTypes.size === 0){
    profileNoMore = true;
    renderProfilePostsList();
    return;
  }
  profileLoading = true;
  loadingRow.style.display = 'block';
  if(reset) renderProfilePostsList(); // clear stale results immediately on a new filter/search
  try{
    const params = new URLSearchParams();
    if(profileFilterTypes.size < PROFILE_POST_TYPES.length){
      params.set('types', [...profileFilterTypes].join(','));
    }
    if(profileTag) params.set('tag', profileTag);
    if(profileQuery) params.set('q', profileQuery);
    if(profileSort === 'likes') params.set('sort', 'likes');
    params.set('offset', profileOffset);
    const res = await fetch(`${API_BASE}/users/${detailUser.handle}/posts?${params}`);
    const data = await res.json();
    if(seq !== profileFetchSeq) return;
    profileItems = profileItems.concat(data.items.map(normalizeProfileItem));
    profileOffset = data.nextOffset;
    profileNoMore = data.nextOffset == null;
  }catch(e){
    console.error(e);
    if(seq === profileFetchSeq) showToast('Could not reach the server');
  }finally{
    if(seq === profileFetchSeq){
      profileLoading = false;
      loadingRow.style.display = 'none';
      renderProfilePostsList();
    }
  }
}

// ---- post composer (and, on the Streaming tab, the video-upload form) ----
let composerOpen = false;
let composerBody = ""; // doubles as the video description on Streaming
let composerTags = [];
let composerFile = null; // { name, type, dataUrl } | null
let composerVideoTitle = ""; // only used/required in Streaming mode
let composerSubmitting = false;

const MAX_UPLOAD_BYTES = 20 * 1024 * 1024;
const ICON_MEDIA = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10.5" r="1.5"/><path d="M21 15l-5-5L5 19"/></svg>`;

function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function attr(s){
  return String(s).replace(/"/g,'&quot;');
}
function isVideoFile(f){
  return !!f && f.type.startsWith('video/');
}

// shown next to "Tags" in any composer — makes the unmet-requirement state
// explicit instead of just reading "0/3", which was easy to miss
function tagCountLabel(tags){
  return tags.length
    ? `<span class="composer-tag-count">${tags.length}/3</span>`
    : `<span class="composer-tag-required">Must select at least one tag</span>`;
}

function composerValid(){
  if(currentTab === 'streaming'){
    return !!composerFile && isVideoFile(composerFile) && composerVideoTitle.trim().length>0 &&
      composerTags.length>=1 && composerTags.length<=3;
  }
  return composerTags.length>=1 && composerTags.length<=3;
}
function composerValidationMessage(){
  if(currentTab === 'streaming'){
    if(!composerFile || !isVideoFile(composerFile)) return 'Attach a video to upload';
    if(!composerVideoTitle.trim()) return 'Give your video a title';
    if(composerTags.length<1) return 'Pick at least one tag';
    return '';
  }
  if(composerTags.length<1) return 'Pick at least one tag to post';
  return '';
}

function resetComposer(){
  composerOpen = false;
  composerBody = "";
  composerTags = [];
  composerFile = null;
  composerVideoTitle = "";
  composerSubmitting = false;
}

function updateComposerSubmitBtn(){
  const btn = document.getElementById('composerSubmitBtn');
  if(!btn) return;
  btn.disabled = !composerValid() || composerSubmitting;
  btn.title = composerSubmitting ? '' : composerValidationMessage();
  const verb = currentTab === 'streaming' ? 'Upload' : 'Post';
  btn.textContent = composerSubmitting ? `${verb}ing…` : verb;
}

function renderComposer(focusBody){
  // News has no composer at all — posting there requires being a verified
  // news provider, which almost nobody is and which you'd only apply for
  // once, so it doesn't get a permanent front-and-center prompt here
  // anymore (see the sidebar's Affiliate page instead).
  if(currentTab === 'news'){
    composerEl.innerHTML = '';
    return;
  }

  const sectionLabel = SECTIONS.find(s=>s.id===currentTab).label;

  if(!composerOpen){
    composerEl.innerHTML = `
      <div class="composer-collapsed" data-action="expand-composer">
        <img class="composer-avatar" src="${PLACEHOLDER_AVATAR}"/>
        <div class="composer-fake-input">${currentTab==='streaming' ? 'Upload a streaming video…' : `Share something in ${sectionLabel}…`}</div>
      </div>`;
    return;
  }

  if(currentTab === 'streaming'){
    renderVideoComposer(focusBody);
    return;
  }

  const mediaBlock = composerFile ? `
    <div class="composer-media-preview">
      ${isVideoFile(composerFile)
        ? `<video src="${composerFile.dataUrl}" controls></video>`
        : `<img src="${composerFile.dataUrl}"/>`}
      <button type="button" class="composer-media-remove" data-action="remove-media" aria-label="Remove media">${ICON_X}</button>
    </div>
  ` : `
    <label class="composer-media-picker" data-action="pick-file" title="Add a photo or video">${ICON_MEDIA} Add a photo or video</label>
  `;

  composerEl.innerHTML = `
    <div class="composer-expanded">
      <textarea class="composer-body" id="composerBodyInput" placeholder="Share something in ${sectionLabel}…">${escapeHtml(composerBody)}</textarea>
      <div>
        <div class="composer-tags-label">Tags ${tagCountLabel(composerTags)}</div>
        <div class="composer-tags">
          ${TAGS.map(t=>`<div class="tag-dropdown-item ${composerTags.includes(t)?'selected':''} ${(!composerTags.includes(t) && composerTags.length>=3)?'disabled':''}" data-ctag="${t}">${t}</div>`).join('')}
        </div>
      </div>
      ${mediaBlock}
      <input type="file" id="composerFileInput" accept="image/*,video/*" hidden/>
      <div class="composer-actions">
        <button type="button" class="composer-btn" data-action="cancel-composer">Cancel</button>
        <button type="button" class="composer-btn primary" id="composerSubmitBtn" data-action="submit-composer" title="${attr(composerValidationMessage())}" ${(!composerValid()||composerSubmitting)?'disabled':''}>${composerSubmitting?'Posting…':'Post'}</button>
      </div>
    </div>`;

  const bodyInput = document.getElementById('composerBodyInput');
  if(focusBody){
    bodyInput.focus();
    bodyInput.setSelectionRange(bodyInput.value.length, bodyInput.value.length);
  }
  bodyInput.addEventListener('input', (e)=>{ composerBody = e.target.value; });

  document.getElementById('composerFileInput').addEventListener('change', (e)=>{
    const file = e.target.files[0];
    e.target.value = '';
    if(!file) return;
    if(file.size > MAX_UPLOAD_BYTES){
      showToast('That file is too large (20MB max)');
      return;
    }
    const reader = new FileReader();
    reader.onload = ()=>{
      composerFile = { name: file.name, type: file.type, dataUrl: reader.result };
      renderComposer();
    };
    reader.readAsDataURL(file);
  });
}

// Streaming tab's composer: a proper video upload, not a lightweight post —
// video + title are required, description and tags round it out.
function renderVideoComposer(focusBody){
  const mediaBlock = composerFile ? `
    <div class="composer-media-preview">
      <video src="${composerFile.dataUrl}" controls></video>
      <button type="button" class="composer-media-remove" data-action="remove-media" aria-label="Remove video">${ICON_X}</button>
    </div>
  ` : `
    <label class="composer-media-picker" data-action="pick-file" title="Add a video">${ICON_MEDIA} Add a video to upload</label>
  `;

  composerEl.innerHTML = `
    <div class="composer-expanded">
      ${mediaBlock}
      <input type="file" id="composerFileInput" accept="video/*" hidden/>
      <input type="text" class="composer-text-input" id="composerVideoTitleInput" placeholder="Video title (required)" value="${attr(composerVideoTitle)}"/>
      <textarea class="composer-body" id="composerBodyInput" placeholder="Describe your video (optional)">${escapeHtml(composerBody)}</textarea>
      <div>
        <div class="composer-tags-label">Tags ${tagCountLabel(composerTags)}</div>
        <div class="composer-tags">
          ${TAGS.map(t=>`<div class="tag-dropdown-item ${composerTags.includes(t)?'selected':''} ${(!composerTags.includes(t) && composerTags.length>=3)?'disabled':''}" data-ctag="${t}">${t}</div>`).join('')}
        </div>
      </div>
      <div class="composer-actions">
        <button type="button" class="composer-btn" data-action="cancel-composer">Cancel</button>
        <button type="button" class="composer-btn primary" id="composerSubmitBtn" data-action="submit-composer" title="${attr(composerValidationMessage())}" ${(!composerValid()||composerSubmitting)?'disabled':''}>${composerSubmitting?'Uploading…':'Upload'}</button>
      </div>
    </div>`;

  document.getElementById('composerFileInput').addEventListener('change', (e)=>{
    const file = e.target.files[0];
    e.target.value = '';
    if(!file) return;
    if(!file.type.startsWith('video/')){
      showToast('Please choose a video file');
      return;
    }
    if(file.size > MAX_UPLOAD_BYTES){
      showToast('That file is too large (20MB max)');
      return;
    }
    const reader = new FileReader();
    reader.onload = ()=>{
      composerFile = { name: file.name, type: file.type, dataUrl: reader.result };
      renderComposer();
    };
    reader.readAsDataURL(file);
  });

  const titleInput = document.getElementById('composerVideoTitleInput');
  if(focusBody){
    titleInput.focus();
    titleInput.setSelectionRange(titleInput.value.length, titleInput.value.length);
  }
  titleInput.addEventListener('input', (e)=>{
    composerVideoTitle = e.target.value;
    updateComposerSubmitBtn();
  });

  const bodyInput = document.getElementById('composerBodyInput');
  bodyInput.addEventListener('input', (e)=>{ composerBody = e.target.value; });

composerEl.addEventListener('click', (e)=>{
  if(e.target.closest('[data-action="expand-composer"]')){
    composerOpen = true;
    renderComposer(true);
    return;
  }
  if(e.target.closest('[data-action="cancel-composer"]')){
    resetComposer();
    renderComposer();
    return;
  }
  if(e.target.closest('[data-action="pick-file"]')){
    document.getElementById('composerFileInput').click();
    return;
  }
  if(e.target.closest('[data-action="remove-media"]')){
    composerFile = null;
    composerVideoTitle = '';
    renderComposer();
    return;
  }
  const tagItem = e.target.closest('[data-ctag]');
  if(tagItem){
    const t = tagItem.getAttribute('data-ctag');
    if(composerTags.includes(t)){
      composerTags = composerTags.filter(x=>x!==t);
    } else if(composerTags.length<3){
      composerTags = [...composerTags, t];
    }
    renderComposer();
    return;
  }
  if(e.target.closest('[data-action="submit-composer"]')){
    submitComposer();
  }
});

async function uploadFile(file){
  const res = await fetch(`${API_BASE}/uploads`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      mimeType: file.type,
      dataBase64: file.dataUrl.split(',')[1]
    })
  });
  if(!res.ok){
    const err = await res.json().catch(()=>({}));
    throw new Error(err.error || 'Failed to upload file');
  }
  return (await res.json()).url;
}

async function submitComposer(){
  if(!composerValid() || composerSubmitting) return;
  composerSubmitting = true;
  updateComposerSubmitBtn();

  if(currentTab === 'streaming'){
    try{
      const videoUrl = await uploadFile(composerFile);
      const res = await fetch(`${API_BASE}/videos`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          videoUrl,
          videoTitle: composerVideoTitle.trim(),
          description: composerBody.trim(),
          tags: composerTags
        })
      });
      if(!res.ok){
        const err = await res.json().catch(()=>({}));
        throw new Error(err.error || 'Failed to upload video');
      }
      const created = normalizeVideo(await res.json());
      resetComposer();
      renderComposer();
      if(view==='feed'){
        videos.unshift(created);
        renderMain();
        window.scrollTo({top:0, behavior:'smooth'});
      }
      showToast('Video uploaded');
    }catch(e){
      console.error(e);
      composerSubmitting = false;
      updateComposerSubmitBtn();
      showToast(e.message || 'Could not reach the server');
    }
    return;
  }

  try{
    let imageUrl, videoUrl;
    if(composerFile){
      const url = await uploadFile(composerFile);
      if(isVideoFile(composerFile)) videoUrl = url;
      else imageUrl = url;
    }
    const res = await fetch(`${API_BASE}/posts`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        section: currentTab,
        body: composerBody.trim(),
        tags: composerTags,
        imageUrl,
        videoUrl
      })
    });
    if(!res.ok){
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error || 'Failed to post');
    }
    const created = normalizePost(await res.json());
    resetComposer();
    renderComposer();
    if(view==='feed'){
      posts.unshift(created);
      renderMain();
      window.scrollTo({top:0, behavior:'smooth'});
    }
    showToast('Posted');
  }catch(e){
    console.error(e);
    composerSubmitting = false;
    updateComposerSubmitBtn();
    showToast(e.message || 'Could not reach the server');
  }
}

// ---- repost modal ----
// A repost is a post like any other — a comment and optional media, no
// title needed either way (posts never have titles) — plus, unlike a
// regular post, no tag picker: tags always mirror the original's, whether
// the original is a post or a streaming video.
let repostModalOpen = false;
let repostTarget = null; // the post or video being reposted
let repostKind = 'post'; // 'post' | 'video'
let repostBody = "";
let repostFile = null; // { name, type, dataUrl } | null
let repostSubmitting = false;

function openRepostModal(target, kind){
  repostTarget = target;
  repostKind = kind;
  repostModalOpen = true;
  repostBody = "";
  repostFile = null;
  repostSubmitting = false;
  renderRepostModal();
}

function closeRepostModal(){
  repostModalOpen = false;
  repostTarget = null;
  renderRepostModal();
}

function updateRepostSubmitBtn(){
  const btn = document.getElementById('repostSubmitBtn');
  if(!btn) return;
  btn.disabled = repostSubmitting;
  btn.textContent = repostSubmitting ? 'Reposting…' : 'Repost';
}

function renderRepostModal(){
  if(!repostModalOpen || !repostTarget){
    repostModalEl.classList.remove('open');
    repostModalEl.innerHTML = '';
    return;
  }
  const target = repostTarget;
  const previewAuthor = repostKind === 'video' ? target.channel : target.author;
  const previewText = repostKind === 'video' ? target.videoTitle : (target.body || '');

  const mediaBlock = repostFile ? `
    <div class="composer-media-preview">
      ${isVideoFile(repostFile)
        ? `<video src="${repostFile.dataUrl}" controls></video>`
        : `<img src="${repostFile.dataUrl}"/>`}
      <button type="button" class="composer-media-remove" data-action="remove-repost-media" aria-label="Remove media">${ICON_X}</button>
    </div>
  ` : `
    <label class="composer-media-picker" data-action="pick-repost-file" title="Add a photo or video">${ICON_MEDIA} Add a photo or video</label>
  `;

  repostModalEl.classList.add('open');
  repostModalEl.innerHTML = `
    <div class="modal-dialog" role="dialog" aria-modal="true">
      <div class="modal-header">
        <div class="modal-title">Repost</div>
        <button type="button" class="modal-close" data-action="close-repost-modal" aria-label="Close">${ICON_X}</button>
      </div>
      <div class="repost-preview">
        <img class="avatar" src="${previewAuthor.avatar}"/>

          <div class="namerow"><span class="displayname">${previewAuthor.name}</span><span class="handle">@${previewAuthor.handle}</span></div>
          <div class="repost-preview-body">${escapeHtml(previewText)}</div>
        </div>
      </div>

      ${mediaBlock}
      <input type="file" id="repostFileInput" accept="image/*,video/*" hidden/>
      <div class="composer-actions">
        <button type="button" class="composer-btn" data-action="close-repost-modal">Cancel</button>
        <button type="button" class="composer-btn primary" id="repostSubmitBtn" data-action="submit-repost" ${repostSubmitting?'disabled':''}>${repostSubmitting?'Reposting…':'Repost'}</button>
      </div>
    </div>`;

  const bodyInput = document.getElementById('repostBodyInput');
  bodyInput.focus();
  bodyInput.setSelectionRange(bodyInput.value.length, bodyInput.value.length);
  bodyInput.addEventListener('input', (e)=>{ repostBody = e.target.value; });

  document.getElementById('repostFileInput').addEventListener('change', (e)=>{
    const file = e.target.files[0];
    e.target.value = '';
    if(!file) return;
    if(file.size > MAX_UPLOAD_BYTES){
      showToast('That file is too large (20MB max)');
      return;
    }
    const reader = new FileReader();
    reader.onload = ()=>{
      repostFile = { name: file.name, type: file.type, dataUrl: reader.result };
      renderRepostModal();
    };
    reader.readAsDataURL(file);
  });
}

repostModalEl.addEventListener('click', (e)=>{
  if(e.target === repostModalEl){ closeRepostModal(); return; }
  if(e.target.closest('[data-action="close-repost-modal"]')){ closeRepostModal(); return; }
  if(e.target.closest('[data-action="pick-repost-file"]')){ document.getElementById('repostFileInput').click(); return; }
  if(e.target.closest('[data-action="remove-repost-media"]')){
    repostFile = null;
    renderRepostModal();
    return;
  }
  if(e.target.closest('[data-action="submit-repost"]')){ submitRepostModal(); }
});

document.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape' && repostModalOpen) closeRepostModal();
});

async function submitRepostModal(){
  if(repostSubmitting || !repostTarget) return;
  repostSubmitting = true;
  updateRepostSubmitBtn();
  const original = repostTarget;
  try{
    let imageUrl, videoUrl;
    if(repostFile){
      const url = await uploadFile(repostFile);
      if(isVideoFile(repostFile)) videoUrl = url;
      else imageUrl = url;
    }
    const endpoint = repostKind === 'video'
      ? `${API_BASE}/videos/${original.id}/repost`
      : `${API_BASE}/posts/${original.id}/repost`;
    const res = await fetch(endpoint, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ body: repostBody.trim(), imageUrl, videoUrl })
    });
    if(!res.ok){
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error || 'Failed to repost');
    }
    const created = normalizePost(await res.json());
    original.reposts += 1;
    closeRepostModal();
    if(repostKind === 'video'){
      showToast(`Reposted @${original.channel.handle}'s video`);
    } else {
      showToast(`@${original.author.handle} was notified of your repost`);
    }
    if(currentTab===created.section && view==='feed'){
      posts.unshift(created);
      renderMain();
      window.scrollTo({top:0, behavior:'smooth'});
    } else {
      showToast(`Reposted to ${SECTIONS.find(s=>s.id===created.section).label}`);
    }
  }catch(e){
    console.error(e);
    repostSubmitting = false;
    updateRepostSubmitBtn();
    showToast(e.message || 'Could not reach the server');
  }
}

const ICON_X = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>`;

function renderSearchField(){
  searchFieldEl.innerHTML = `
    ${selectedTag ? `
      <span class="search-tagpill" data-tag-pill="1">
        ${selectedTag}
        <button type="button" data-remove-tag="1" aria-label="Remove tag filter">${ICON_X}</button>
      </span>` : ''}
    <input id="searchInput" type="text"
      placeholder="${selectedTag ? 'Search within ' + selectedTag + '…' : 'Search or filter by tag…'}"
      value="${searchQuery.replace(/"/g,'&quot;')}" autocomplete="off"/>
  `;
  const input = searchFieldEl.querySelector('#searchInput');

  input.addEventListener('input', (e)=>{
    searchQuery = e.target.value;
    clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(()=>refetchCurrentTab(true), 300);
  });

  input.addEventListener('keydown', (e)=>{
    if(e.key === 'Backspace' && input.selectionStart === 0 && input.selectionEnd === 0 && selectedTag){
      e.preventDefault();
      selectedTag = null;
      renderSearchField();
      renderTagDropdown();
      refetchCurrentTab(true);
      const newInput = searchFieldEl.querySelector('#searchInput');
      newInput.focus();
    }
  });

  input.addEventListener('focus', ()=>{
    openTagDropdown();
  });
}

function renderTagDropdown(){
  tagDropdownEl.innerHTML = `
    <div class="tag-dropdown-label">Filter by tag ${selectedTag ? '· 1 selected' : ''}</div>
    <div class="tag-dropdown-grid">
      ${TAGS.map(t=>`<div class="tag-dropdown-item ${selectedTag===t?'selected':''}" data-tag="${t}">${t}</div>`).join('')}
    </div>
  `;
}

function openTagDropdown(){
  tagDropdownEl.classList.add('open');
}
function closeTagDropdown(){
  tagDropdownEl.classList.remove('open');
}

searchComboEl.addEventListener('mousedown', (e)=>{
  // clicking anywhere in the field (not the remove button) focuses the text input
  if(e.target.closest('[data-remove-tag]')) return;
  if(e.target.closest('.tag-dropdown-item')) return;
  const input = searchFieldEl.querySelector('#searchInput');
  if(input && e.target !== input){
    e.preventDefault();
    input.focus();
  }
});

searchFieldEl.addEventListener('click', (e)=>{
  const removeBtn = e.target.closest('[data-remove-tag]');
  if(!removeBtn) return;
  selectedTag = null;
  renderSearchField();
  renderTagDropdown();
  refetchCurrentTab(true);
  searchFieldEl.querySelector('#searchInput').focus();
});

tagDropdownEl.addEventListener('click', (e)=>{
  const item = e.target.closest('[data-tag]');
  if(!item) return;
  const t = item.getAttribute('data-tag');
  selectedTag = (selectedTag === t) ? null : t; // single-select only
  renderSearchField();
  renderTagDropdown();
  refetchCurrentTab(true);
  closeTagDropdown();
  searchFieldEl.querySelector('#searchInput').focus();
});

document.addEventListener('click', (e)=>{
  if(!searchComboEl.contains(e.target)){
    closeTagDropdown();
  }
});

function renderTabs(){
  tabsEl.innerHTML = SECTIONS.map(s=>`
    <button class="tabbtn ${currentTab===s.id?'active':''}" data-tab="${s.id}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${s.icon}</svg>${s.label}
    </button>`).join('');
}

function renderSubTabs(){

    <button class="subtabbtn ${streamingSubTab===s.id?'active':''}" data-subtab="${s.id}">${s.label}</button>`).join('');
}
