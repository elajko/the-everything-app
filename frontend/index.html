async function submitRepostModal(){
  if(repostSubmitting || !repostTarget) return;
  repostSubmitting = true;
  updateRepostSubmitBtn();
  const original = repostTarget;
  try{
    let imageUrl, videoUrl;
    if(repostFile){
      const url = await uploadFile(repostFile);
      if(isVideoFile(repostFile)) videoUrl = url;
      else imageUrl = url;
    }
    const endpoint = repostKind === 'video'
      ? `${API_BASE}/videos/${original.id}/repost`
      : `${API_BASE}/posts/${original.id}/repost`;
    const res = await fetch(endpoint, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ body: repostBody.trim(), imageUrl, videoUrl })
    });
    if(!res.ok){
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error || 'Failed to repost');
    }
    const created = normalizePost(await res.json());
    original.reposts += 1;
    closeRepostModal();
    if(repostKind === 'video'){
      showToast(`Reposted @${original.channel.handle}'s video`);
    } else {
      showToast(`@${original.author.handle} was notified of your repost`);
    }
    if(currentTab===created.section && view==='feed'){
      posts.unshift(created);
      renderMain();
      window.scrollTo({top:0, behavior:'smooth'});
    } else {
      showToast(`Reposted to ${SECTIONS.find(s=>s.id===created.section).label}`);
    }
  }catch(e){
    console.error(e);
    repostSubmitting = false;
    updateRepostSubmitBtn();
    showToast(e.message || 'Could not reach the server');
  }
}

// ---- mobile bottom bar (max-width:900px only — see .mobile-bottombar) ----
// The search box and composer are hidden on mobile by default (see the
// .search-row/.composer rules in that same media query) and revealed by
// toggling a class on .shell, rather than a separate piece of state —
// renderMain() already clears both classes whenever you leave the feed
// (see its "view !== 'feed'" guard), so there's nothing extra to reset here.
function openMobileSearch(){
  closeSidebar();
  // mutually exclusive with the composer panel — leaves composerOpen/its
  // draft alone, just hides it, so reopening it via the compose button
  // picks the draft back up rather than discarding it
  shellEl.classList.remove('show-mobile-composer');
  shellEl.classList.add('show-mobile-search');
  renderMain(); // swaps the feed for the "search for something" prompt
  searchFieldEl.querySelector('#searchInput')?.focus();
}
function closeMobileSearch(){
  selectedTag = null;
  searchQuery = "";
  renderSearchField();
  renderTagDropdown();
  shellEl.classList.remove('show-mobile-search');
  refetchCurrentTab(true);
}
function openMobileComposer(){
  if(currentTab === 'news') return; // no composer to show there — see renderComposer
  closeSidebar();
  // mutually exclusive with the search panel — if search's "search for
  // something" prompt was showing in the feed, renderMain() puts the
  // normal feed back now that show-mobile-search is off
  shellEl.classList.remove('show-mobile-search');
  shellEl.classList.add('show-mobile-composer');
  renderMain();
  composerOpen = true;
  renderComposer(true);
}
function goHome(){
  closeSidebar();
  shellEl.classList.remove('show-mobile-search', 'show-mobile-composer');
  if(view !== 'feed'){
    // already have the feed loaded in memory — just navigate back to it
    // at the scroll position you left it (closeDetail restores that),
    // rather than reloading and losing your place
    closeDetail({push: true});
  } else {
    // already on the feed — a second "home" press means take me to the
    // very top and check for new stuff
    window.scrollTo({top: 0, behavior: 'instant'});
    refetchCurrentTab(true);
  }
}

function rerenderReplyComposer(kind, id){
  const el = document.getElementById('replyComposer');
  if(el) el.innerHTML = replyComposerHtml(kind, id);
}
function renderReplySection(kind, id){
  return `
    <div class="comments-section">
      <div class="comment-composer" id="replyComposer">${replyComposerHtml(kind, id)}</div>
      <div class="comments-list" id="repliesList">${repliesListHtml()}</div>
    </div>`;
}

// Shown above a post on its own detail page when it's itself a reply —
// the single thing it's replying to (see Post.parent/parentVideo), reusing
// the exact same compact embed treatment reposts already get. Only posts
// can be replies (comments are posts; videos can't be), so this only
// ever applies on a post's detail page, never a video's.
function renderParentContext(post){
  if(post.parent){
    return `<div class="reply-context-label">Replying to <span data-user-handle="${post.parent.author.handle}">@${post.parent.author.handle}</span></div>${renderEmbed(post.parent, 1)}`;
  }
  if(post.parentVideo){
    return `<div class="reply-context-label">Replying to <span data-user-handle="${post.parentVideo.channel.handle}">@${post.parentVideo.channel.handle}</span></div>${renderVideoEmbed(post.parentVideo)}`;
  }
  return '';
}

// a post's own image/video is plain media — same treatment either way, no
// title, no special layout (that's exclusive to Streaming's Video model)
function renderPostMedia(post){
  if(post.video) return `<video class="post-video" src="${post.video}" controls></video>`;
  if(post.image) return `<img class="post-image" src="${post.image}" loading="lazy"/>`;
  return '';
}

// a post embeds either another post (repost of a post, recursive) or a
// video (repost of a streaming video, rendered as a compact watch-card) —
// never both
function renderPostEmbed(post, depth){
  if(post.embedVideo) return renderVideoEmbed(post.embedVideo);
  if(post.embed) return renderEmbed(post.embed, depth);
  return '';
}

// shared by posts, embeds, and the video detail page's channel header —
// avatar and name/handle are both click targets that open that user's
// profile (see the [data-user-handle] delegated handler)
function renderPostHead(profile, date){
  return `
      <div class="post-head">
        <img class="avatar" data-user-handle="${profile.handle}" src="${profile.avatar}"/>
        <div class="post-headtext">
          <div class="namerow" data-user-handle="${profile.handle}"><span class="displayname">${profile.name}</span><span class="handle">@${profile.handle}</span></div>
          <div class="postdate">${fmtDate(date)}</div>
        </div>
      </div>`;
}

function renderEmbed(post, depth){
  if(!post || depth>3) return '';
  return `
    <div class="embed" data-id="${post.id}">
      ${renderPostHead(post.author, post.date)}
      ${post.body ? `<div class="post-body">${post.body}</div>` : ''}
      ${renderPostMedia(post)}
      ${renderPostEmbed(post, depth+1)}
    </div>`;
}

// short rectangular "watch streaming video" card — how a repost of a Video
// embeds, distinct from a normal post-to-post embed
function renderVideoEmbed(video){
  return `
    <div class="embed video-embed" data-video-id="${video.id}">
      <div class="embed-flag">${ICON_PLAY} Watch streaming video</div>
      <div class="video-embed-row">
        <img class="video-embed-thumb" src="${video.thumbnail || pickImage('stream'+video.id)}" loading="lazy"/>
        <div class="video-embed-meta">
          <div class="video-embed-title">${video.videoTitle}</div>
          <div class="video-embed-channel">
            <img class="video-embed-avatar" data-user-handle="${video.channel.handle}" src="${video.channel.avatar}"/>
            <span class="displayname" data-user-handle="${video.channel.handle}">${video.channel.name}</span>
            <span class="handle" data-user-handle="${video.channel.handle}">@${video.channel.handle}</span>
            <span class="postdate">${fmtDate(video.date)}</span>
          </div>
        </div>
      </div>
    </div>`;
}

function renderPost(post, extraClass){
  return `
    <div class="post ${extraClass||''}" data-id="${post.id}">
      ${tagPills(post.tags)}
      ${renderPostHead(post.author, post.date)}
      ${post.body ? `<div class="post-body">${post.body}</div>` : ''}
      ${renderPostMedia(post)}
      ${renderPostEmbed(post, 1)}
      ${renderActionBar('post', post)}
    </div>`;
}

// Social-tab-only alternate view when filtered to exactly one of
// MASONRY_TAGS — just the images, Pinterest-style, in place of the normal
// post list. Clicking a tile opens the same post detail view a normal row
// would (see the [data-id] delegated click handler) — this is purely a
// different way to browse the search results, not a different post shape.
// Text-only posts (no image) matching the tag simply don't have a tile to
// show here and are left out.
function renderMasonryGrid(posts){
  const withImages = posts.filter(p=>p.image);
  if(!withImages.length) return '';
  return `
    <div class="masonry-grid">
      ${withImages.map(p=>`
        <div class="masonry-item" data-id="${p.id}">
          <img src="${p.image}" loading="lazy" alt=""/>
        </div>
      `).join('')}
    </div>`;
}

// Streaming tab's YouTube-style detail page — exclusive to the Video model.
// Posts never use this layout, even when they happen to have a video
// attached (see renderPostMedia).
function renderVideoDetailPage(video){
  return `
    <div class="post detail-post video-detail" data-id="${video.id}">
      ${tagPills(video.tags)}
      <video class="post-video" src="${video.video}" controls poster="${video.thumbnail||''}"></video>
      <div class="video-title">${video.videoTitle}</div>
      <div class="video-detail-meta">
        ${renderPostHead(video.channel, video.date)}
        ${renderActionBar('video', video)}
      </div>
      ${video.description ? `<div class="post-body">${video.description}</div>` : ''}
    </div>`;
}

function renderProfileLinkCard(link){
  const icon = (link.platform && PLATFORM_ICONS[link.platform]) || ICON_LINK_GENERIC;
  return `
    <a class="profile-link-card" href="${attr(link.url)}" target="_blank" rel="noopener noreferrer">
      <div class="profile-link-icon">${icon}</div>
      <div class="profile-link-text">
        <div class="profile-link-name">${escapeHtml(link.label)}</div>
        ${link.description ? `<div class="profile-link-desc">${escapeHtml(link.description)}</div>` : ''}
      </div>
    </a>`;
}

// Banner is always rendered, image or not — a bannerless profile just gets
// a flat --tag-bg rectangle in place of the <img> (see .profile-banner-wrap
// CSS) so the layout doesn't shift around depending on whether one's set.
// The avatar lives in its bottom-left corner, overlapping the bottom edge;
// handle/name sit to its right, still on the image itself. Below the
// banner: a topline reserving space beside the avatar's overlap for the
// verified badge, then bio, then the links grid, then the posts section —
// its own search (type/tag/sort/keyword) over this user's Posts and Videos
// merged into one list; see fetchProfilePosts.
// The badge isn't a free-text field — it's only ever "Verified news
// provider", and only for accounts that actually are one.
function renderProfilePage(user){
  return `
    <div class="profile-page">
      <div class="profile-banner-wrap">
        ${user.banner ? `<img class="profile-banner-img" src="${user.banner}"/>` : ''}
        <div class="profile-banner-scrim"></div>
        <div class="profile-banner-overlay">
          <img class="profile-banner-avatar" src="${user.avatar}"/>
          <div class="profile-banner-text">
            <div class="profile-banner-handle">@${user.handle}</div>
            <div class="profile-banner-name">${escapeHtml(user.name)}</div>
          </div>
        </div>
        ${user.handle === currentUserHandle ? `
          <button type="button" class="profile-edit-btn" data-action="open-profile-edit" aria-label="Edit profile" title="Edit profile">${ICON_PENCIL}</button>
        ` : ''}
      </div>
      <div class="profile-hero">
        <div class="profile-hero-topline">
          <div class="profile-avatar-spacer"></div>
          ${user.verifiedNewsProvider ? `<div class="profile-verified-badge">${ICON_CHECK}Verified news provider</div>` : ''}
        </div>
        ${user.bio ? `<div class="profile-bio">${escapeHtml(user.bio)}</div>` : ''}
      </div>
      ${user.links.length ? `
      <div class="profile-links-section">
        <div class="profile-links-title">Links</div>
        <div class="profile-links-grid">
          ${user.links.map(renderProfileLinkCard).join('')}
        </div>
      </div>` : ''}
      <div class="profile-posts-section">
        <div class="profile-posts-toolbar">
          <div class="profile-posts-typerow" id="profileTypeRow">
            ${renderProfileTypeRowHtml(user)}
          </div>
          <div class="profile-posts-searchrow">
            <div class="search-combo" id="profileSearchCombo">
              <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
              <div class="search-field" id="profileSearchField">${profileSearchFieldHtml(user)}</div>
              <div class="tag-dropdown" id="profileTagDropdown">${profileTagDropdownHtml()}</div>
            </div>
            <div class="profile-sort-row" id="profileSortRow">
              ${renderProfileSortRowHtml()}
            </div>
          </div>
        </div>
        <div class="profile-posts-list" id="profilePostsList"></div>
      </div>
    </div>`;
}

function renderCard(video){
  return `
    <div class="card" data-id="${video.id}">
      <div class="card-thumbwrap">
        <img class="card-thumb" src="${video.thumbnail || pickImage('stream'+video.id)}" loading="lazy"/>
      </div>
      ${tagPills(video.tags).replace('post-tags','post-tags card-tags')}
      <div class="card-meta">
        <img class="card-avatar" data-user-handle="${video.channel.handle}" src="${video.channel.avatar}"/>
        <div>
          <div class="card-title">${video.videoTitle}</div>
          <div class="card-sub"><span data-user-handle="${video.channel.handle}">@${video.channel.handle}</span> · ${fmtDate(video.date)}</div>
        </div>
      </div>
    </div>`;
}

function renderMain(){
  const onPlaceholderSubTab = currentTab==='streaming' && streamingSubTab!=='vids';
  composerEl.style.display = (view!=='feed' || onPlaceholderSubTab || currentTab==='news') ? 'none' : '';
  searchRowEl.style.display = (view!=='feed' || onPlaceholderSubTab) ? 'none' : '';
  tabsEl.style.display = view!=='feed' ? 'none' : '';
  subTabsEl.style.display = (view!=='feed' || currentTab!=='streaming') ? 'none' : 'flex';
  // the mobile-only "reveal search/composer" toggles (see the bottom bar)
  // only make sense on the feed — clear them on any other page so they
  // don't come back open by surprise if you navigate back to the feed
  if(view !== 'feed') shellEl.classList.remove('show-mobile-search', 'show-mobile-composer');

  if(view==='affiliate'){
    applayoutEl.classList.remove('wide');
    feedbodyEl.innerHTML = `
      <div class="detailwrap">
        <div class="backbtn" data-action="back">${ICON_BACK} Back to ${SECTIONS.find(s=>s.id===currentTab).label}</div>
        ${renderAffiliatePage()}
      </div>`;
    return;
  }

  if(view==='messages'){
    applayoutEl.classList.remove('wide');
    feedbodyEl.innerHTML = `
      <div class="detailwrap">
        <div class="backbtn" data-action="back">${ICON_BACK} Back to ${SECTIONS.find(s=>s.id===currentTab).label}</div>
        ${renderMessagesListPage()}
      </div>`;
    return;
  }

  if(view==='messageThread'){
    applayoutEl.classList.remove('wide');
    feedbodyEl.innerHTML = `
      <div class="detailwrap">
        <div class="backbtn" data-action="back-to-messages">${ICON_BACK} Back to Messages</div>
        ${renderMessageThreadPage()}
      </div>`;
    sizeThreadPage();
    scrollThreadToBottom();
    return;
  }

  if(view==='profile'){
    applayoutEl.classList.remove('wide');
    const user = detailUser;
    if(!user){ view='feed'; renderMain(); return; }
    feedbodyEl.innerHTML = `
      <div class="detailwrap">
        <div class="backbtn" data-action="back">${ICON_BACK} Back to ${SECTIONS.find(s=>s.id===currentTab).label}</div>
        ${renderProfilePage(user)}
      </div>`;
    // renderProfilePage's #profilePostsList placeholder is always empty —
    // repopulate it from current state (no network call) so a full
    // renderMain() (e.g. from a like/repost elsewhere) doesn't blank it out
    renderProfilePostsList();
    return;
  }

  if(view==='detail'){
    if(detailType==='video'){
      applayoutEl.classList.add('wide');
      const video = detailVideo;
      if(!video){ view='feed'; renderMain(); return; }
      feedbodyEl.innerHTML = `
        <div class="detailwrap">
          <div class="backbtn" data-action="back">${ICON_BACK} Back to ${SECTIONS.find(s=>s.id===currentTab).label}</div>
          ${renderVideoDetailPage(video)}
          ${renderReplySection('video', video.id)}
        </div>`;
      return;
    }
    applayoutEl.classList.remove('wide');
    const post = detailPost;
    if(!post){ view='feed'; renderMain(); return; }
    feedbodyEl.innerHTML = `
      <div class="detailwrap">
        <div class="backbtn" data-action="back">${ICON_BACK} Back to ${SECTIONS.find(s=>s.id===currentTab).label}</div>
        ${renderParentContext(post)}
        ${renderPost(post, 'detail-post')}
        ${renderReplySection('post', post.id)}
      </div>`;
    return;
  }

  // mobile search (see the bottom bar's search icon) opens over whatever
  // tab you're on but starts out with no query/tag — rather than dumping
  // the full unfiltered feed under it, prompt for a search instead. Once
  // there's a query or tag, this falls through to the normal branches
  // below like desktop search always has.
  if(shellEl.classList.contains('show-mobile-search') && !searchQuery && !selectedTag){
    applayoutEl.classList.remove('wide');
    countPill.textContent = '';
    feedbodyEl.innerHTML = `
      <div class="empty-state">
        <svg class="search-prompt-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <b>Search The Everything App</b>
        Find posts by keyword, or pick a tag to filter by.
      </div>`;
    return;
  }

  if(currentTab==='streaming'){
    applayoutEl.classList.add('wide');
    if(onPlaceholderSubTab){
      countPill.textContent = '';
      const label = STREAMING_SUBTABS.find(s=>s.id===streamingSubTab).label;
      feedbodyEl.innerHTML = `<div class="empty-state"><b>${label} isn't here yet</b>This is on the roadmap — for now, Streaming only supports uploaded videos (Vids).</div>`;
      return;
    }
    countPill.textContent = `${videos.length} video${videos.length===1?'':'s'}`;
    feedbodyEl.innerHTML = videos.length
      ? `<div class="grid">${videos.map(renderCard).join('')}</div>`
      : (videoLoading
          ? `<div class="empty-state"><b>Loading…</b></div>`
          : `<div class="empty-state"><b>No matching videos</b>Try clearing a tag filter or a different keyword.</div>`);
    return;
  }

  applayoutEl.classList.remove('wide');
  countPill.textContent = `${posts.length} post${posts.length===1?'':'s'}`;

  if(currentTab === 'social' && MASONRY_TAGS.includes(selectedTag)){
    const grid = renderMasonryGrid(posts);
    feedbodyEl.innerHTML = grid
      ? grid
      : (loading
          ? `<div class="empty-state"><b>Loading…</b></div>`
          : `<div class="empty-state"><b>No matching posts</b>Try clearing a tag filter or a different keyword.</div>`);
    return;
  }

  feedbodyEl.innerHTML = posts.length
    ? posts.map(p=>renderPost(p)).join('')
    : (loading
        ? `<div class="empty-state"><b>Loading…</b></div>`
        : `<div class="empty-state"><b>No matching posts</b>Try clearing a tag filter or a different keyword.</div>`);
}

// ---- detail-page URL routing (hash-based — this is a static single-file
// app with no server-side routes, so a real path like /post/<id> would
// 404 on refresh; the hash never reaches the static file server). Posts and
// videos are separate resources, so each gets its own hash namespace. ----
function postUrl(id){
  return `${location.origin}${location.pathname}#post/${id}`;
}
function videoPermalink(id){
  return `${location.origin}${location.pathname}#video/${id}`;
}
function profileUrl(handle){
  return `${location.origin}${location.pathname}#user/${handle}`;
}

// remembers where you were in the feed so "back" restores it exactly,
// instead of dumping you at the top of a re-rendered list
let savedFeedScrollY = 0;

function openPostDetail(post, {push=true}={}){
  if(view === 'feed') savedFeedScrollY = window.scrollY;
  detailPost = post;
  detailVideo = null;
  detailType = 'post';
  detailId = post.id;
  currentTab = post.section;
  view = 'detail';
  replyDraft = "";
  replyFile = null;
  renderTabs();
  renderSubTabs();
  renderComposer();
  if(push) history.pushState({postId: post.id}, '', `#post/${post.id}`);
  renderMain();
  window.scrollTo({top:0, behavior:'instant'});
  fetchReplies('post', post.id, true);
}

function openVideoDetail(video, {push=true}={}){
  // deliberately doesn't touch currentTab — a video opened from a repost
  // embed while browsing Social/News should return there on "back", not
  // get yanked into Streaming. Only a card click (already on Streaming) or
  // a fresh permalink load (see initFromUrl) sets currentTab explicitly.
  if(view === 'feed') savedFeedScrollY = window.scrollY;
  detailVideo = video;
  detailPost = null;
  detailType = 'video';
  detailId = video.id;
  view = 'detail';
  replyDraft = "";
  replyFile = null;
  renderTabs();
  renderSubTabs();
  renderComposer();
  if(push) history.pushState({videoId: video.id}, '', `#video/${video.id}`);
  renderMain();
  window.scrollTo({top:0, behavior:'instant'});
  fetchReplies('video', video.id, true);
}

function closeDetail({push=true}={}){
  view = 'feed';
  detailPost = null;
  detailVideo = null;
  detailUser = null;
  if(push) history.pushState({}, '', location.pathname + location.search);
  renderMain();
  window.scrollTo({top: savedFeedScrollY, behavior:'instant'});
}

// static page, no data to load — same "back returns to whatever tab you
// were on" convention as openProfile/openVideoDetail (see their comments)
function openAffiliatePage({push=true}={}){
  if(view === 'feed') savedFeedScrollY = window.scrollY;
  view = 'affiliate';
  renderTabs();
  renderSubTabs();
  renderComposer();
  if(push) history.pushState({affiliate:true}, '', '#affiliate');
  renderMain();
  window.scrollTo({top:0, behavior:'instant'});
}

// profiles are always fetched fresh by handle (no local "already loaded"
// list to check against, unlike posts/videos), so open+load are one step.
async function openProfile(handle, {push=true}={}){
  const cameFromFeed = view === 'feed';
  const scrollYAtClick = window.scrollY;
  try{
    const res = await fetch(`${API_BASE}/users/${handle}`);
    if(!res.ok) throw new Error('not found');
    const user = normalizeProfileUser(await res.json());
    if(cameFromFeed) savedFeedScrollY = scrollYAtClick;
    // deliberately doesn't touch currentTab, same reasoning as
    // openVideoDetail — "back" should return wherever you came from
    detailUser = user;
    detailPost = null;
    detailVideo = null;
    view = 'profile';
    // fresh profile — reset its post search back to defaults rather than
    // carrying over whatever the last-viewed profile had filtered to.
    // Empty = unselected = show everything (see profileFilterTypes above).
    profileFilterTypes = new Set();
    profileTag = null;
    profileQuery = "";
    profileSort = 'recent';
    renderTabs();
    renderSubTabs();
    renderComposer();
    if(push) history.pushState({handle}, '', `#user/${handle}`);
    renderMain();
    window.scrollTo({top:0, behavior:'instant'});
    fetchProfilePosts(true);
  }catch(e){
    console.error(e);
    showToast('Could not load that profile');
  }
}

async function loadPostFromHash(id, {push=false}={}){
  const known = posts.find(p=>p.id===id) || (detailPost && detailPost.id===id ? detailPost : null);
  if(known){
    openPostDetail(known, {push});
    return;
  }
  try{
    const res = await fetch(`${API_BASE}/posts/${id}`);
    if(!res.ok) throw new Error('not found');
    const post = normalizePost(await res.json());
    openPostDetail(post, {push});
  }catch(e){
    console.error(e);
    showToast('Could not load that post');
    closeDetail({push});
  }
}

async function loadVideoFromHash(id, {push=false}={}){
  const known = videos.find(v=>v.id===id) || (detailVideo && detailVideo.id===id ? detailVideo : null);
  if(known){
    openVideoDetail(known, {push});
    return;
  }
  try{
    const res = await fetch(`${API_BASE}/videos/${id}`);
    if(!res.ok) throw new Error('not found');
    const video = normalizeVideo(await res.json());
    openVideoDetail(video, {push});
  }catch(e){
    console.error(e);
    showToast('Could not load that video');
    closeDetail({push});
  }
}

window.addEventListener('popstate', ()=>{
  const mp = location.hash.match(/^#post\/(.+)$/);
  const mv = location.hash.match(/^#video\/(.+)$/);
  const mu = location.hash.match(/^#user\/(.+)$/);
  const mt = location.hash.match(/^#messages\/(.+)$/);
  if(mp){
    loadPostFromHash(decodeURIComponent(mp[1]), {push:false});
  } else if(mv){
    loadVideoFromHash(decodeURIComponent(mv[1]), {push:false});
  } else if(mu){
    openProfile(decodeURIComponent(mu[1]), {push:false});
  } else if(location.hash === '#affiliate'){
    openAffiliatePage({push:false});
  } else if(location.hash === '#messages'){
    openMessagesPage({push:false});
  } else if(mt){
    openMessageThread(decodeURIComponent(mt[1]), {push:false});
  } else {
    closeDetail({push:false});
  }
});

// a permalink loaded directly by URL, or an embedded repost target, may not
// be in the paginated `posts` array top-level — walk embed chains too
// before giving up
function findEmbeddedPost(post, id){
  if(!post) return null;
  if(post.id === id) return post;
  return findEmbeddedPost(post.embed, id) || findEmbeddedPost(post.parent, id);
}
function findPost(id){
  if(detailPost){
    const inDetail = findEmbeddedPost(detailPost, id);
    if(inDetail) return inDetail;
  }
  for(const p of posts){
    const found = findEmbeddedPost(p, id);
    if(found) return found;
  }
  for(const r of replies){
    const found = findEmbeddedPost(r, id);
    if(found) return found;
  }
  for(const item of profileItems){
    if(item.type !== 'post') continue;
    const found = findEmbeddedPost(item, id);
    if(found) return found;
  }
  return null;
}
function findVideo(id){
  if(detailVideo && detailVideo.id===id) return detailVideo;
  const found = videos.find(v=>v.id===id);
  if(found) return found;
  const item = profileItems.find(i=>i.type==='video' && i.id===id);
  return item || null;
}

// ---- delegated interactions ----

  const likeBtn = e.target.closest('[data-action="like"]');
  const repostBtn = e.target.closest('[data-action="repost"]');
  const shareBtn = e.target.closest('[data-action="share"]');
  const commentBtn = e.target.closest('[data-action="comment"]');
  const submitCommentBtn = e.target.closest('[data-action="submit-comment"]');
  const backBtn = e.target.closest('[data-action="back"]');
  const userHandleEl = e.target.closest('[data-user-handle]');
  const embedEl = e.target.closest('.embed');
  const card = e.target.closest('.card');
  const postRow = e.target.closest('.post');
  const typePill = e.target.closest('[data-profile-type]');
  const resetFilterBtn = e.target.closest('[data-action="reset-profile-filter"]');
  const sortBtn = e.target.closest('[data-sort]');
  const profileTagRemoveBtn = e.target.closest('#profileSearchField [data-remove-tag]');

    profileFilterTypes.clear();
    const rowEl = document.getElementById('profileTypeRow');
    if(rowEl && detailUser) rowEl.innerHTML = renderProfileTypeRowHtml(detailUser);
    fetchProfilePosts(true);
    return;
  }

  if(typePill){
    const t = typePill.getAttribute('data-profile-type');
    if(profileFilterTypes.has(t)) profileFilterTypes.delete(t); else profileFilterTypes.add(t);
    const rowEl = document.getElementById('profileTypeRow');
    if(rowEl && detailUser) rowEl.innerHTML = renderProfileTypeRowHtml(detailUser);
    fetchProfilePosts(true);
    return;
  }

  if(profileTagRemoveBtn){
    profileTag = null;
    rerenderProfileSearchCombo(detailUser);
    fetchProfilePosts(true);
    document.getElementById('profilePostsSearch')?.focus();
    return;
  }

  if(profileTagItem){
    const t = profileTagItem.getAttribute('data-tag');
    profileTag = (profileTag === t) ? null : t; // single-select only
    rerenderProfileSearchCombo(detailUser);
    fetchProfilePosts(true);
    document.getElementById('profileTagDropdown')?.classList.remove('open');
    document.getElementById('profilePostsSearch')?.focus();
    return;
  }

  if(sortBtn){
    const s = sortBtn.getAttribute('data-sort');
    if(profileSort !== s){
      profileSort = s;
      // toggle the class on the existing buttons rather than re-rendering
      // the row's innerHTML — a freshly-created node has no prior state to
      // transition from, so the CSS width/opacity transition wouldn't play
      const rowEl = document.getElementById('profileSortRow');
      if(rowEl){
        rowEl.querySelectorAll('[data-sort]').forEach(btn=>{
          btn.classList.toggle('active', btn.getAttribute('data-sort') === s);
        });
      }
      fetchProfilePosts(true);
    }
    return;
  }

  if(likeBtn){
    const id = likeBtn.getAttribute('data-id');
    const kind = likeBtn.getAttribute('data-kind');
    const item = kind==='video' ? findVideo(id) : findPost(id);
    item.liked = !item.liked;
    item.likes += item.liked ? 1 : -1;
    renderMain();
    fetch(`${API_BASE}/${kind==='video'?'videos':'posts'}/${id}/like`, {method:'POST'})
      .then(r=>r.json())
      .then(updated=>{
        item.likes = updated.likes;
        item.liked = updated.liked;
        renderMain();
      })
      .catch(()=>showToast('Could not reach the server'));
    return;
  }
  if(repostBtn){
    const id = repostBtn.getAttribute('data-id');
    const kind = repostBtn.getAttribute('data-kind');
    const item = kind==='video' ? findVideo(id) : findPost(id);
    openRepostModal(item, kind);
    return;
  }
  if(shareBtn){
    const id = shareBtn.getAttribute('data-id');
    const kind = shareBtn.getAttribute('data-kind');
    copyToClipboard(kind==='video' ? videoPermalink(id) : postUrl(id));
    return;
  }
  if(commentBtn){
    const id = commentBtn.getAttribute('data-id');
    const kind = commentBtn.getAttribute('data-kind');
    const alreadyOpen = view==='detail' && detailType===kind && detailId===id;
    if(!alreadyOpen){
      const item = kind==='video' ? findVideo(id) : findPost(id);
      if(item){
        if(kind==='video') openVideoDetail(item); else openPostDetail(item);
      } else if(kind==='video'){
        loadVideoFromHash(id, {push:true});
      } else {
        loadPostFromHash(id, {push:true});
      }
    }
    document.getElementById('commentInput')?.focus();
    return;
  }
  if(submitCommentBtn){
    const id = submitCommentBtn.getAttribute('data-id');
    const kind = submitCommentBtn.getAttribute('data-kind');
    submitReply(kind, id);
    return;
  }
  if(e.target.closest('[data-action="pick-reply-file"]')){
    document.getElementById('replyFileInput')?.click();
    return;
  }
  if(e.target.closest('[data-action="remove-reply-media"]')){
    replyFile = null;
    rerenderReplyComposer(detailType, detailId);
    return;
  }
  if(backBtn){
    closeDetail();
    return;
  }
  if(e.target.closest('[data-action="back-to-messages"]')){
    openMessagesPage();
    return;
  }
  if(e.target.closest('[data-action="apply-affiliate"]')){
    showToast("Applications aren't open yet");
    return;
  }
  if(e.target.closest('[data-action="open-profile-edit"]')){
    openProfileEdit();
    return;
  }
  const dmItem = e.target.closest('[data-dm-handle]');
  if(dmItem){
    openMessageThread(dmItem.getAttribute('data-dm-handle'));
    return;
  }
  if(e.target.closest('#threadSendBtn')){
    sendThreadMessage();
    return;
  }
  if(userHandleEl){
    openProfile(userHandleEl.getAttribute('data-user-handle'));
    return;
  }
  if(embedEl){
    if(embedEl.classList.contains('video-embed')){
      const vid = embedEl.getAttribute('data-video-id');
      const found = findVideo(vid);
      if(found) openVideoDetail(found);
      else loadVideoFromHash(vid, {push:true});
    } else {
      const id = embedEl.getAttribute('data-id');
      const found = findPost(id);
      if(found) openPostDetail(found);
      else loadPostFromHash(id, {push:true});
    }
    return;
  }
  const masonryItem = e.target.closest('.masonry-item');
  if(masonryItem){
    const post = findPost(masonryItem.getAttribute('data-id'));
    if(post) openPostDetail(post);
    return;
  }
  if(card){
    const video = findVideo(card.getAttribute('data-id'));
    if(video) openVideoDetail(video);
    return;
  }
  if(postRow && !postRow.classList.contains('detail-post') && !e.target.closest('.embed')){
    const post = findPost(postRow.getAttribute('data-id'));
    if(post) openPostDetail(post);
  }
});

// profile posts toolbar and the message thread composer — delegated too,
// since both live in markup that's recreated fresh each time that page loads
feedbodyEl.addEventListener('input', (e)=>{
  if(e.target.id === 'profilePostsSearch'){
    profileQuery = e.target.value;
    clearTimeout(profileSearchDebounceTimer);
    profileSearchDebounceTimer = setTimeout(()=>fetchProfilePosts(true), 300);
  } else if(e.target.id === 'threadComposerInput'){
    messageComposerText = e.target.value;
    updateThreadSendBtn();
  } else if(e.target.id === 'commentInput'){
    replyDraft = e.target.value;
    updateReplySubmitBtn();
  }
});
feedbodyEl.addEventListener('change', (e)=>{
  if(e.target.id !== 'replyFileInput') return;
  const file = e.target.files[0];
  e.target.value = '';
  if(!file) return;
  if(file.size > MAX_UPLOAD_BYTES){
    showToast('That file is too large (20MB max)');
    return;
  }
  const reader = new FileReader();
  reader.onload = ()=>{
    replyFile = { name: file.name, type: file.type, dataUrl: reader.result };
    rerenderReplyComposer(detailType, detailId);
  };
  reader.readAsDataURL(file);
});
feedbodyEl.addEventListener('keydown', (e)=>{
  if(e.target.id === 'threadComposerInput' && e.key === 'Enter'){
    e.preventDefault();
    sendThreadMessage();
  } else if(e.target.id === 'profilePostsSearch' && e.key === 'Backspace'
    && e.target.selectionStart === 0 && e.target.selectionEnd === 0 && profileTag){
    e.preventDefault();
    profileTag = null;
    rerenderProfileSearchCombo(detailUser);
    fetchProfilePosts(true);
    document.getElementById('profilePostsSearch')?.focus();
  }
});
// focus/blur don't bubble, so use focusin (which does) to open the profile
// combo's tag dropdown the same way #searchInput's focus listener does
feedbodyEl.addEventListener('focusin', (e)=>{
  if(e.target.id === 'profilePostsSearch'){
    document.getElementById('profileTagDropdown')?.classList.add('open');
  }
});
// mirrors searchComboEl's mousedown listener: clicking anywhere in the
// combo (not the remove-tag button or a dropdown item) focuses the input
feedbodyEl.addEventListener('mousedown', (e)=>{
  const combo = e.target.closest('#profileSearchCombo');
  if(!combo) return;
  if(e.target.closest('[data-remove-tag]')) return;
  if(e.target.closest('.tag-dropdown-item')) return;
  const input = document.getElementById('profilePostsSearch');
  if(input && e.target !== input){
    e.preventDefault();
    input.focus();
  }
});

let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

function copyToClipboard(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(
      ()=>showToast('Link copied'),
      ()=>fallbackCopy(text)
    );
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try{
    document.execCommand('copy');
    showToast('Link copied');
  }catch(e){
    showToast('Could not copy link');
  }
  document.body.removeChild(ta);
}

// ---- tab switching ----
tabsEl.addEventListener('click', (e)=>{
  const btn = e.target.closest('[data-tab]');
  if(!btn) return;
  currentTab = btn.getAttribute('data-tab');
  streamingSubTab = 'vids';
  view = 'feed';
  renderTabs();
  renderSubTabs();
  renderComposer();
  refetchCurrentTab(true);
});

subTabsEl.addEventListener('click', (e)=>{
  const btn = e.target.closest('[data-subtab]');
  if(!btn) return;
  streamingSubTab = btn.getAttribute('data-subtab');
  renderSubTabs();
  renderComposer();
  renderMain();
});

// ---- infinite scroll ----
const sentinel = document.getElementById('sentinel');
const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(!entry.isIntersecting) return;
    if(view==='feed') refetchCurrentTab(false);
    else if(view==='profile') fetchProfilePosts(false);
  });
}, {rootMargin:"500px"});
observer.observe(sentinel);

renderTabs();
renderSubTabs();
renderComposer();
renderSearchField();
renderTagDropdown();
applyTheme();
fetchTags();
fetchCurrentUser();

(async function initFromUrl(){
  const mp = location.hash.match(/^#post\/(.+)$/);
  const mv = location.hash.match(/^#video\/(.+)$/);
  const mu = location.hash.match(/^#user\/(.+)$/);
  const mt = location.hash.match(/^#messages\/(.+)$/);
  if(mp){
    await loadPostFromHash(decodeURIComponent(mp[1]), {push:false});
  } else if(mv){
    // a cold visit to a video permalink has no prior tab context to
    // preserve, so default its "back" destination to Streaming
    currentTab = 'streaming';
    await loadVideoFromHash(decodeURIComponent(mv[1]), {push:false});
  } else if(mu){
    await openProfile(decodeURIComponent(mu[1]), {push:false});
  } else if(location.hash === '#affiliate'){
    openAffiliatePage({push:false});
  } else if(location.hash === '#messages'){
    await openMessagesPage({push:false});
  } else if(mt){
    await openMessageThread(decodeURIComponent(mt[1]), {push:false});
  }
  fetchConversations();
  refetchCurrentTab(true);
})();
})();
</script>
