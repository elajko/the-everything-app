<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Everything App</title>
</head>
<body>
<style>
  :root{
    --paper:#FFFFFF;
    --surface:#FFFFFF;
    --ink:#0F1419;
    --ink-soft:#4B5157;
    --muted:#536471;
    --border:#E4E1DA;
    --border-soft:#EFF3F4;
    --tag-bg:#F0F3F6;
    --tag-ink:#57636C;
    --accent:#1D9BF0;
    --accent-soft:#E7EBFF;
    --accent2:#A67C2E;
    --accent2-soft:#F3ECDD;
    --like:#F91880;
    --like-soft:rgba(249,24,128,0.1);
    --topbar-bg:rgba(255,255,255,0.92);
    --hover-bg:rgba(15,20,25,0.06);
    --radius:8px;
    --shell-width:640px;      /* Social/News column width, once space allows */
    --shell-width-wide:780px; /* Streaming column width, once space allows */
    --sidebar-width:220px;       /* left sidebar (nav) */
    --sidebar-right-width:356px; /* right sidebar (DMs) — left sidebar's width × the golden ratio (220 × 1.618). Not a calc() off --sidebar-width since that variable itself shrinks in the icon-only breakpoint below, and this one shouldn't follow it there. */
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  .feedapp{
    background:var(--paper);
    color:var(--ink);
    min-height:100%;
    display:flex;
    justify-content:center;
    padding:0 0 60px 0;
    transition:background .15s ease, color .15s ease;
  }
  html, body{
    margin:0;
    min-height:100%;
    background:var(--paper);
  }
  html[data-theme="dark"]{
    --paper:#000000;
    --surface:#000000;
    --ink:#E7E9EA;
    --ink-soft:#C7C7C7;
    --muted:#71767B;
    --border:#2F3336;
    --border-soft:#1E1E1E;
    --tag-bg:#1C1C1C;
    --tag-ink:#B5B5B5;
    --accent:#1D9BF0;
    --accent-soft:#1A2440;
    --accent2:#D3A15A;
    --accent2-soft:#2C2519;
    --like:#F91880;
    --like-soft:rgba(249,24,128,0.1);
    --topbar-bg:rgba(0,0,0,0.75);
    --hover-bg:rgba(231,233,234,0.1);
  }
  .feedapp ::selection{background:var(--accent-soft);}

  /* ---------- app layout: sidebar + shell ---------- */
  /* .applayout's own size is driven directly off the same --shell-width
     vars (not left to shrink-to-fit auto-sizing) — some browsers don't
     reliably re-run an ancestor's intrinsic-size calc when only a
     descendant's width changes via class toggle, which left the row
     visibly stuck at the old width when switching tabs. It animates via
     flex-basis (not width) for the same reason .shell does below — width
     transitions on flex items are unreliable, flex-basis isn't. Keeping
     flex-shrink:1 so it still shrinks gracefully on narrow viewports. */
  .applayout{
    display:flex;
    align-items:flex-start;
    gap:32px;
    padding:0 16px 0 16px;
    flex:0 1 calc(var(--sidebar-width) + 32px + var(--shell-width) + 32px + var(--sidebar-right-width) + 32px);
    min-width:0;
    transition:flex-basis .18s ease;
  }
  .applayout.wide{flex-basis:calc(var(--sidebar-width) + 32px + var(--shell-width-wide) + 32px + var(--sidebar-right-width) + 32px);}
  .sidebar{
    width:var(--sidebar-width);
    flex:none;
    position:sticky;
    top:20px;
    margin-top:24px; /* the shell's top gap moved from .applayout's padding into .shell's own padding-top (so the border wraps it too) — this replaces that gap for the sidebar, which isn't bordered anyway */
    display:flex;
    flex-direction:column;
    gap:4px;
    transition:width .18s ease;
  }
  /* deliberately wider than the left sidebar (--sidebar-right-width vs
     --sidebar-width) — the layout isn't meant to be left/right-balanced */
  .sidebar-right{
    width:var(--sidebar-right-width);flex:none;
    position:sticky;top:20px;
    margin-top:24px; /* see .sidebar's own margin-top comment */
    display:flex;flex-direction:column;gap:14px;
  }
  .dm-preview-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;padding:2px 0 4px 0;}
  .dm-preview-card-header{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px 8px 14px;}
  .dm-preview-card-title{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:800;color:var(--ink);}
  .dm-preview-card-title svg{width:19px;height:19px;flex:none;}
  .dm-preview-card-showall{
    font-size:13px;font-weight:700;color:var(--accent);
    cursor:pointer;white-space:nowrap;flex:none;
  }
  .dm-preview-card-showall:hover{text-decoration:underline;}
  .dm-preview-list{display:flex;flex-direction:column;gap:1px;}
  .dm-preview-item{
    display:flex;align-items:center;gap:9px;
    padding:8px 14px;
    border-radius:0;
    cursor:pointer;
    transition:background .12s ease;
  }
  .dm-preview-item:hover{background:var(--hover-bg);}
  .dm-preview-avatar-wrap{position:relative;flex:none;}
  .dm-preview-avatar{
    width:40px;height:40px;border-radius:100px;object-fit:cover;display:block;
    border:1px solid var(--border-soft);background:var(--tag-bg);
  }
  .dm-preview-badge{
    position:absolute;top:-3px;right:-3px;
    min-width:16px;height:16px;
    padding:0 4px;
    border-radius:100px;
    background:var(--accent);
    color:#fff;
    font-size:11.5px;
    font-weight:800;
    display:flex;align-items:center;justify-content:center;
    border:2px solid var(--paper);
  }
  .dm-preview-text{min-width:0;flex:1;}
  .dm-preview-handle{font-size:14.5px;font-weight:700;color:var(--ink);}
  .dm-preview-snippet{
    font-size:13.5px;color:var(--muted);margin-top:1px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .dm-preview-empty{font-size:13.5px;color:var(--muted);padding:8px;}

  /* ---------- messages list page ---------- */
  .messages-page-title{font-size:21px;font-weight:800;color:var(--ink);padding:16px 16px 12px 16px;}
  .dm-preview-list-full .dm-preview-item{padding:12px 16px;border-radius:0;}
  .dm-preview-list-full .dm-preview-avatar{width:48px;height:48px;}
  .dm-preview-list-full .dm-preview-handle{font-size:15.5px;}
  .dm-preview-list-full .dm-preview-snippet{font-size:14.5px;}

  /* ---------- message thread page ---------- */
  /* fills the viewport below the header/backbtn (min-height set in JS,
     since that offset depends on whatever's rendered above it) so the
     composer sits at the very bottom and short conversations bottom-align
     against it instead of floating at the top — see scrollThreadToBottom's
     neighboring sizing call in the script for the height math. */
  .thread-page{display:flex;flex-direction:column;}
  .thread-header{display:flex;align-items:center;gap:10px;padding:16px;border-bottom:1px solid var(--border-soft);flex:none;}
  .thread-header-avatar{width:42px;height:42px;border-radius:100px;object-fit:cover;border:1px solid var(--border-soft);background:var(--tag-bg);}
  .thread-header-name{font-size:16px;font-weight:700;color:var(--ink);}
  .thread-header-handle{font-size:13.5px;color:var(--muted);margin-top:1px;}
  .thread-messages{
    display:flex;flex-direction:column;justify-content:flex-end;gap:8px;
    padding:18px 16px;
    flex:1;
  }
  .thread-start-marker{
    text-align:center;
    font-size:12.5px;
    color:var(--muted);
    padding:0 20px;
    margin-bottom:4px;
  }
  .thread-msg{display:flex;}
  .thread-msg-mine{justify-content:flex-end;}
  .thread-msg-theirs{justify-content:flex-start;}
  .thread-msg-bubble{
    max-width:75%;
    padding:8px 12px;
    border-radius:16px;
    font-size:15px;
    line-height:1.4;
    white-space:pre-wrap;
    word-break:break-word;
  }
  .thread-msg-mine .thread-msg-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px;}
  .thread-msg-theirs .thread-msg-bubble{background:var(--tag-bg);color:var(--ink);border-bottom-left-radius:4px;}
  .thread-composer{
    display:flex;gap:8px;
    padding:14px 16px;
    border-top:1px solid var(--border-soft);
    flex:none;
  }
  .thread-composer-input{
    flex:1;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:100px;
    padding:9px 14px;
    font-size:15px;
    color:var(--ink);
    outline:none;
  }
  .thread-composer-input:focus{border-color:var(--accent);}
  .thread-composer-send{
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:100px;
    padding:9px 18px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition:opacity .12s ease;
  }
  .thread-composer-send:disabled{opacity:0.45;cursor:default;}
  .thread-composer-send:not(:disabled):hover{opacity:0.88;}
  .sidebar-brand{
    display:flex;
    align-items:center;
    gap:7px;
    font-weight:800;
    font-size:18px;
    letter-spacing:0.2px;
    color:var(--ink);
    white-space:nowrap;
    padding:8px 10px 20px 10px;
  }
  .sidebar-brand .brand-mark{
    width:11px;height:11px;border-radius:2px;
    background:var(--accent);
    transform:rotate(45deg);
    flex:none;
  }
  .sidebar-settings{position:relative;}
  .sidebar-settings-btn{
    display:flex;
    align-items:center;
    gap:15px;
    width:100%;
    background:none;
    border:none;
    padding:12px 14px;
    border-radius:100px;
    font-size:19px;
    font-weight:500;
    color:var(--ink);
    cursor:pointer;
    text-align:left;
    transition:background .12s ease, color .12s ease;
  }
  .sidebar-settings-btn:hover{background:var(--hover-bg);}
  .sidebar-settings-btn svg{width:24px;height:24px;flex:none;}
  .sidebar-post-btn{
    display:flex;align-items:center;justify-content:center;
    width:100%;
    margin-top:8px;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:100px;
    padding:14px;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
    transition:opacity .12s ease;
  }
  .sidebar-post-btn:hover{opacity:0.9;}
  .sidebar-backdrop{display:none;}
  .menu-btn{
    display:none;
    align-items:center;justify-content:center;
    width:30px;height:30px;border-radius:7px;flex:none;
    background:var(--surface);border:1px solid var(--border);
    color:var(--muted);cursor:pointer;
    margin-bottom:10px;
  }
  .menu-btn:hover{color:var(--ink);border-color:var(--accent);}
  .menu-btn svg{width:16px;height:16px;}

  /* narrower desktop viewports: the left sidebar is the first thing to
     give ground — it collapses to an icon-only rail before the shell
     (center content) has to shrink at all. Text labels hide, icons
     center, and a native title tooltip stands in for the label. Right
     sidebar and shell are untouched here; true mobile (drawer, no right
     sidebar) doesn't kick in until the max-width:900px block below. */
  @media (min-width: 901px) and (max-width: 1300px){
    :root{ --sidebar-width: 64px; }
    .sidebar-brand{justify-content:center;}
    .brand-text{display:none;}
    .sidebar-settings-btn{justify-content:center;}
    .sidebar-settings-btn span{display:none;}
    .sidebar-post-btn span{display:none;}
    .sidebar-post-btn::after{content:'+';font-size:26px;line-height:1;}
  }

  /* mobile-only "close search" chevron, to the left of the search box —
     hidden here, shown (and the search box hidden by default) inside the
     max-width:900px block below */
  .search-back-btn{
    display:none;
    align-items:center;justify-content:center;flex:none;
    width:32px;height:32px;
    border-radius:7px;
    background:none;border:none;color:var(--muted);cursor:pointer;
  }
  .search-back-btn svg{width:17px;height:17px;}
  .search-back-btn:hover{color:var(--ink);background:var(--hover-bg);}

  /* mobile-only bottom nav — search/notifications/messages/compose/home.
     Parent is display:none outside the max-width:900px block below, so
     these child rules don't need their own media-query gating. */
  .mobile-bottombar{
    display:none;
    position:fixed;left:0;right:0;bottom:0;
    z-index:92;
    background:var(--surface);
    border-top:1px solid var(--border);
    padding:6px 4px;
    align-items:center;
    justify-content:space-around;
  }
  .mobile-bottombar-btn{
    display:flex;align-items:center;justify-content:center;
    width:46px;height:46px;
    border-radius:10px;
    background:none;border:none;color:var(--muted);cursor:pointer;
    transition:background .12s ease, color .12s ease;
  }
  .mobile-bottombar-btn:hover{color:var(--accent);background:var(--accent-soft);}
  .mobile-bottombar-btn svg{width:23px;height:23px;}

  @media (max-width: 900px){
    .applayout{padding:0 16px 0 16px;}
    .sidebar-right{display:none;}
    /* ".applayout .shell" (not just ".shell") to outrank the base .shell
       rule declared later in the stylesheet — same reasoning as the
       ".shell .search-row" rule above. */
    .applayout .shell{border-left:none;border-right:none;}
    /* smaller top gap on mobile — same "outrank via extra specificity"
       reasoning, this time against .topbar's own padding declared later */
    .applayout .topbar{padding-top:12px;}
    /* search box and composer are hidden by default on mobile — each has
       a bottom-bar button that adds the matching .show-mobile-* class to
       .shell to reveal it (see the mobile bottom bar's click handler).
       ".shell X" (not just "X") to outrank .search-row's own base
       display:flex, which is declared later in the stylesheet and would
       otherwise win the tie on specificity+source-order alone. */
    .shell .search-row{display:none;}
    .shell .composer{display:none;}
    .shell.show-mobile-search .search-row{display:flex;}
    .shell.show-mobile-composer .composer{display:flex;}
    .search-back-btn{display:flex;}
    .mobile-bottombar{display:flex;}
    .feedapp{padding-bottom:78px;} /* clears the fixed bottom bar */
    .sidebar{
      position:fixed;
      top:0;left:0;bottom:0;
      width:250px;
      margin-top:0; /* it's a full-height drawer here, not sticky nav — cancel the base rule's margin-top */
      background:var(--surface);
      border-right:1px solid var(--border);
      padding:16px 10px;
      transform:translateX(-100%);
      transition:transform .2s ease;
      z-index:90;
      overflow-y:auto;
    }
    .sidebar.open{transform:translateX(0);}
    .sidebar-backdrop{
      display:block;
      position:fixed;inset:0;
      background:rgba(8,8,8,0.5);
      z-index:89;
      opacity:0;
      pointer-events:none;
      transition:opacity .2s ease;
    }
    .sidebar-backdrop.open{opacity:1;pointer-events:auto;}
    .menu-btn{display:flex;}
    /* sidebars are out of flow (drawer / hidden) here, so shell is the
       only flex item left — fall back to fluid width */
    .applayout, .applayout.wide{flex-basis:100%;}
    .shell, .applayout.wide .shell{flex-basis:100%;}
  }

  .shell{
    /* animating flex-basis (not width) — width transitions on flex items
       are unreliable across browsers since the flex algorithm recomputes
       the item's used size from its basis each frame; flex-basis is the
       property actually meant to be animated for flex-item sizing. */
    flex:0 1 var(--shell-width);
    min-width:0;
    display:flex;
    flex-direction:column;
    transition:flex-basis .18s ease;
    border-left:1px solid var(--border);
    border-right:1px solid var(--border);
    /* this used to be .applayout's padding-top — moved here (instead) so
       the top gap is part of the bordered box, not a strip above it with
       no border that scrolls away and leaves the border looking like it
       starts partway down the page. The gap itself now lives in .topbar's
       own padding-top instead of here — see its comment — so it's exactly
       0, just enough for the border to reach the very top. */
  }
  .applayout.wide .shell{flex-basis:var(--shell-width-wide);}

  /* ---------- top bar ---------- */
  .topbar{
    position:sticky;
    top:0;
    z-index:20;
    background:var(--topbar-bg);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--border);
    /* the top gap above the search bar lives here (not on .shell) — this
       element is what's actually sticky, and its own background+blur is
       what should be visible in that gap once scrolled, not raw feed
       content showing through nothing */
    padding:24px 16px 0 16px;
  }
  .search-combo{
    flex:1;
    position:relative;
    min-width:0;
  }
  .search-icon{
    position:absolute;left:11px;top:50%;transform:translateY(-50%);
    width:14px;height:14px;color:var(--muted);pointer-events:none;
    z-index:1;
  }
  .search-field{
    display:flex;
    align-items:center;
    gap:6px;
    width:100%;
    background:var(--tag-bg);
    border:1px solid transparent;
    border-radius:100px;
    padding:8px 10px 8px 36px;
    min-height:38px;
    cursor:text;
    transition:border-color .12s ease, background .12s ease;
  }
  .search-field:focus-within{border-color:var(--accent);background:var(--surface);}
  .search-field input{
    flex:1;
    min-width:50px;
    border:none;
    outline:none;
    background:transparent;
    font-size:14.5px;
    font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;
    color:var(--ink);
    padding:1px 0;
  }
  .search-field input::placeholder{color:var(--muted);}
  .search-tagpill{
    display:flex;
    align-items:center;
    gap:4px;
    background:var(--accent);
    color:#fff;
    font-size:12.5px;
    font-weight:700;
    padding:3px 5px 3px 8px;
    border-radius:100px;
    white-space:nowrap;
    flex:none;
  }
  .search-tagpill button{
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(255,255,255,0.22);
    border:none;
    border-radius:100px;
    width:14px;height:14px;
    color:#fff;
    cursor:pointer;
    padding:0;
    flex:none;
  }
  .search-tagpill button:hover{background:rgba(255,255,255,0.4);}
  .search-tagpill button svg{width:8px;height:8px;}
  .tag-dropdown{
    position:absolute;
    top:calc(100% + 6px);
    left:0;
    right:0;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:9px;
    box-shadow:0 10px 28px rgba(0,0,0,0.14);
    padding:9px;
    z-index:35;
    display:none;
    max-height:220px;
    overflow-y:auto;
  }
  .tag-dropdown.open{display:block;}
  .tag-dropdown-label{
    font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;
    color:var(--muted);margin-bottom:7px;
  }
  .tag-dropdown-grid{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
  }
  .tag-dropdown-item{
    border:1px solid var(--border);
    background:var(--paper);
    color:var(--tag-ink);
    font-size:13px;
    font-weight:600;
    padding:5px 10px;
    border-radius:100px;
    cursor:pointer;
    transition:all .12s ease;
    user-select:none;
  }
  .tag-dropdown-item:hover{border-color:var(--accent);color:var(--ink);}
  .tag-dropdown-item.selected{background:var(--accent);border-color:var(--accent);color:#fff;}
  .tag-divider{flex-basis:100%;height:0;border-top:1px solid var(--border);margin:2px 0;}
  .count-pill{
    font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;
    font-size:12.5px;
    color:var(--muted);
    white-space:nowrap;
    flex:none;
  }
  .settings-panel{
    position:absolute;top:calc(100% + 4px);left:0;
    background:var(--surface);border:1px solid var(--border);
    border-radius:9px;box-shadow:0 10px 28px rgba(0,0,0,0.14);
    padding:10px;width:190px;z-index:95;
    display:none;
  }
  .settings-panel.open{display:block;}
  .settings-label{
    font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;
    color:var(--muted);margin-bottom:7px;
  }
  .theme-toggle{display:flex;gap:6px;}
  .theme-opt{
    flex:1;text-align:center;padding:7px 0;border-radius:6px;
    border:1px solid var(--border);background:var(--paper);
    color:var(--ink-soft);font-size:13.5px;font-weight:600;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:4px;
  }
  .theme-opt svg{width:14px;height:14px;}
  .theme-opt.active{background:var(--accent);border-color:var(--accent);color:#fff;}

  /* ---------- search row (full width, above tabs) ---------- */
  .search-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 0 9px 0;
  }

  /* ---------- post composer ---------- */
  /* sits below the tabs/subtabs row now — border-top (not -bottom) divides
     it from the nav above; the topbar's own outer border-bottom already
     closes it off from the feed below, so composer needs no border there */
  .composer{
    border-top:1px solid var(--border-soft);
    padding:11px 0 12px 0;
  }
  .composer-collapsed{
    display:flex;
    align-items:center;
    gap:9px;
    cursor:text;
  }
  .composer-avatar{
    width:36px;height:36px;border-radius:100px;object-fit:cover;flex:none;
    background:var(--tag-bg);border:1px solid var(--border-soft);
  }
  .composer-fake-input{
    flex:1;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:100px;
    padding:10px 16px;
    font-size:15px;
    color:var(--muted);
    transition:border-color .12s ease;
  }
  .composer-collapsed:hover .composer-fake-input{border-color:var(--accent);}
  .composer-expanded{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .composer-body{
    width:100%;
    border:1px solid var(--border);
    border-radius:8px;
    background:var(--surface);
    color:var(--ink);
    font-size:15.5px;
    font-family:inherit;
    line-height:1.5;
    padding:12px;
    resize:vertical;
    min-height:64px;
    outline:none;
  }
  .composer-body:focus{border-color:var(--accent);}
  .composer-tags-label{
    display:flex;align-items:center;gap:6px;
    font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;
    color:var(--muted);margin-bottom:7px;
  }
  .composer-tag-count{
    font-size:12.5px;font-weight:700;text-transform:none;letter-spacing:0;
    color:var(--accent);
  }
  .composer-tag-required{
    font-size:12.5px;font-weight:700;text-transform:none;letter-spacing:0;
    color:var(--muted);
  }
  .composer-tags{display:flex;flex-wrap:wrap;gap:6px;}
  .tag-dropdown-item.disabled{opacity:0.35;pointer-events:none;}
  .composer-text-input{
    flex:1;min-width:160px;
    border:1px solid var(--border);
    border-radius:6px;
    background:var(--surface);
    color:var(--ink);
    font-size:14px;
    padding:7px 9px;
    outline:none;
    font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;
    transition:opacity .12s ease, border-color .12s ease;
  }
  .composer-text-input:focus{border-color:var(--accent);}
  .composer-media-picker{
    display:flex;align-items:center;justify-content:center;gap:7px;
    border:1.5px dashed var(--border);
    border-radius:8px;
    padding:14px;
    font-size:14px;
    font-weight:600;
    color:var(--muted);
    cursor:pointer;
    transition:border-color .12s ease, color .12s ease, background .12s ease;
  }
  .composer-media-picker:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
  .composer-media-picker svg{width:15px;height:15px;flex:none;}
  .composer-media-preview{position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--border-soft);background:var(--tag-bg);}
  .composer-media-preview img,
  .composer-media-preview video{width:100%;max-height:260px;object-fit:cover;display:block;background:#000;}
  .composer-media-remove{
    position:absolute;top:7px;right:7px;
    width:24px;height:24px;border-radius:100px;
    background:rgba(20,20,18,0.65);color:#fff;border:none;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
  }
  .composer-media-remove svg{width:10px;height:10px;}
  .composer-media-remove:hover{background:rgba(20,20,18,0.85);}
  .composer-actions{display:flex;justify-content:flex-end;gap:8px;}
  .composer-btn{
    padding:7px 16px;border-radius:100px;font-size:14.5px;font-weight:700;
    cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--ink-soft);
    transition:border-color .12s ease;
  }
  .composer-btn:hover{border-color:var(--accent);}
  .composer-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .composer-btn.primary:disabled{opacity:0.4;cursor:default;}
  .composer-btn.primary:disabled:hover{border-color:var(--accent);}

  /* ---------- repost modal ---------- */
  .modal-overlay{
    position:fixed;inset:0;
    background:rgba(8,8,8,0.6);
    display:none;
    align-items:center;justify-content:center;
    z-index:100;
    padding:20px;
  }
  .modal-overlay.open{display:flex;}
  .modal-dialog{
    background:var(--surface);
    border-radius:12px;
    max-width:440px;
    width:100%;
    max-height:85vh;
    overflow-y:auto;
    padding:16px;
    box-shadow:0 24px 60px rgba(0,0,0,0.35);
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .modal-header{display:flex;align-items:center;justify-content:space-between;}
  .modal-title{font-size:17px;font-weight:800;color:var(--ink);}
  .modal-close{
    display:flex;align-items:center;justify-content:center;
    width:26px;height:26px;border-radius:100px;flex:none;
    background:var(--tag-bg);border:none;color:var(--muted);cursor:pointer;
  }
  .modal-close svg{width:11px;height:11px;}
  .modal-close:hover{color:var(--ink);}
  .repost-preview{
    display:flex;gap:8px;
    border:1px solid var(--border-soft);
    border-radius:8px;
    padding:8px 10px;
    background:var(--paper);
  }
  .repost-preview .avatar{width:32px;height:32px;flex:none;}
  .repost-preview-body{
    font-size:14px;color:var(--ink-soft);
    margin-top:2px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }

  /* ---------- profile edit ---------- */
  .profile-edit-btn{
    position:absolute;right:14px;bottom:14px;
    width:36px;height:36px;border-radius:100px;flex:none;
    display:flex;align-items:center;justify-content:center;
    background:rgba(0,0,0,0.55);
    color:#fff;border:1px solid rgba(255,255,255,0.3);
    cursor:pointer;
    transition:background .12s ease;
  }
  .profile-edit-btn:hover{background:rgba(0,0,0,0.75);}
  .profile-edit-btn svg{width:17px;height:17px;}

  .profile-edit-dialog{max-width:480px;}
  .profile-edit-avatar-row{display:flex;align-items:center;gap:14px;}
  .profile-edit-avatar-preview{
    width:72px;height:72px;border-radius:14px;object-fit:cover;flex:none;
    border:1px solid var(--border-soft);background:var(--tag-bg);
  }
  .profile-edit-avatar-btn{
    border:1px solid var(--border);background:var(--surface);color:var(--ink-soft);
    font-size:13px;font-weight:700;padding:8px 14px;border-radius:100px;
    cursor:pointer;transition:border-color .12s ease;
  }
  .profile-edit-avatar-btn:hover{border-color:var(--accent);color:var(--ink);}
  .profile-edit-label{
    display:flex;align-items:center;justify-content:space-between;
    font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;
    color:var(--muted);margin-top:4px;
  }
  .profile-edit-charcount{text-transform:none;letter-spacing:0;font-weight:600;}
  .profile-edit-input, .profile-edit-textarea{
    width:100%;
    border:1px solid var(--border);
    border-radius:8px;
    background:var(--surface);
    color:var(--ink);
    font-size:14px;
    font-family:inherit;
    padding:9px 11px;
    outline:none;
  }
  .profile-edit-input:focus, .profile-edit-textarea:focus{border-color:var(--accent);}
  .profile-edit-textarea{resize:vertical;min-height:70px;line-height:1.45;}

  .profile-edit-links{display:flex;flex-direction:column;gap:10px;}
  .profile-edit-link-row{
    display:flex;flex-direction:column;gap:6px;
    border:1px solid var(--border-soft);border-radius:8px;padding:10px;
  }
  .profile-edit-link-row-top{display:flex;gap:6px;}
  .profile-edit-link-select{
    border:1px solid var(--border);background:var(--surface);color:var(--ink);
    font-size:12.5px;border-radius:6px;padding:6px 8px;outline:none;flex:none;
  }
  .profile-edit-link-remove{
    display:flex;align-items:center;justify-content:center;
    width:28px;height:28px;border-radius:100px;flex:none;
    background:var(--tag-bg);border:none;color:var(--muted);cursor:pointer;
  }
  .profile-edit-link-remove:hover{color:var(--like);}
  .profile-edit-link-remove svg{width:12px;height:12px;}
  .profile-edit-link-input{
    flex:1;border:1px solid var(--border);background:var(--surface);color:var(--ink);
    font-size:12.5px;border-radius:6px;padding:6px 9px;outline:none;min-width:0;
  }
  .profile-edit-add-link{
    align-self:flex-start;
    border:1.5px dashed var(--border);background:none;color:var(--muted);
    font-size:12.5px;font-weight:700;padding:8px 14px;border-radius:8px;cursor:pointer;
    transition:border-color .12s ease, color .12s ease;
  }
  .profile-edit-add-link:hover{border-color:var(--accent);color:var(--accent);}

  /* ---------- avatar crop ---------- */
  .avatar-crop-viewport{
    width:280px;height:280px;
    margin:0 auto;
    border-radius:14px;
    overflow:hidden;
    position:relative;
    background:#000;
    cursor:grab;
    touch-action:none;
  }
  .avatar-crop-viewport:active{cursor:grabbing;}
  .avatar-crop-viewport img{
    position:absolute;
    user-select:none;
    -webkit-user-drag:none;
    pointer-events:none;
  }
  .avatar-crop-zoom{width:100%;accent-color:var(--accent);}
  .avatar-crop-hint{text-align:center;font-size:12px;color:var(--muted);margin-top:2px;}

  /* ---------- section tabs ---------- */
  .tabs{
    display:flex;
    gap:2px;
  }
  .tabbtn{
    flex:none;
    background:none;
    border:none;
    cursor:pointer;
    font-size:14.5px;
    font-weight:700;
    color:var(--muted);
    padding:10px 16px 11px 16px;
    border-bottom:2.5px solid transparent;
    display:flex;
    align-items:center;
    gap:7px;
    transition:color .12s ease;
  }
  .tabbtn svg{width:15px;height:15px;}
  .tabbtn:hover{color:var(--ink);}
  .tabbtn.active{
    color:var(--accent);
    border-bottom-color:var(--accent);
  }

  /* ---------- streaming-only sub-tabs (Vids/Livestreams/Shows/Music) ---------- */
  /* no border-bottom here — composer's own border-top is what divides the
     nav (tabs+subtabs) from it now that composer sits below both */
  .subtabs{
    display:none;
    gap:6px;
    padding:8px 14px 10px 14px;
    flex-wrap:wrap;
  }
  .subtabbtn{
    flex:none;
    background:var(--tag-bg);
    border:1px solid transparent;
    cursor:pointer;
    font-size:13.5px;
    font-weight:700;
    color:var(--muted);
    padding:5px 12px;
    border-radius:100px;
    transition:background .12s ease, color .12s ease;
  }
  .subtabbtn:hover{color:var(--ink);}
  .subtabbtn.active{background:var(--accent);color:#fff;}



  /* ---------- feed body wrapper ---------- */
  .feedbody{padding-top:2px;}
  .empty-state{
    padding:50px 20px;
    text-align:center;
    color:var(--muted);
    font-size:15px;
  }
  .empty-state b{color:var(--ink);display:block;font-size:16px;margin-bottom:4px;}
  .search-prompt-icon{width:34px;height:34px;color:var(--muted);display:block;margin:0 auto 14px auto;}

  /* ---------- post row (list) ---------- */
  .post{
    border-bottom:1px solid var(--border-soft);
    background:var(--surface);
    padding:14px 16px 15px 16px;
    animation:fadein .25s ease;
    cursor:pointer;
  }
  .post:hover{background:var(--hover-bg);}
  @keyframes fadein{from{opacity:0;transform:translateY(2px);}to{opacity:1;transform:none;}}
  .post-tags{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
  .tag-pill{
    font-size:11.5px;font-weight:700;letter-spacing:0.3px;text-transform:uppercase;
    background:var(--tag-bg);color:var(--tag-ink);padding:4px 9px;border-radius:5px;
  }
  .post-head{display:flex;align-items:flex-start;gap:10px;}
  .avatar{
    width:38px;height:38px;border-radius:100px;object-fit:cover;flex:none;
    background:var(--tag-bg);border:1px solid var(--border-soft);
  }
  .post-headtext{flex:1;min-width:0;}
  .namerow{display:flex;align-items:baseline;gap:5px;flex-wrap:wrap;}
  .displayname{font-weight:700;font-size:15.5px;color:var(--ink);}
  .handle{font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;font-size:13.5px;color:var(--accent);}
  /* clickable avatar/handle -> profile page, used across posts/embeds/cards */
  [data-user-handle]{cursor:pointer;}
  img[data-user-handle]:hover{opacity:0.85;}
  .namerow[data-user-handle]:hover .displayname{text-decoration:underline;}
  .postdate{font-size:13px;color:var(--muted);margin-top:1px;font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;}
  .post-body{font-size:15.5px;line-height:1.55;color:var(--ink-soft);margin:9px 0 0 0;white-space:pre-wrap;}
  .post-image{margin-top:8px;width:100%;max-height:280px;object-fit:cover;border-radius:7px;border:1px solid var(--border-soft);display:block;}
  .post-video{
    margin-top:8px;
    width:100%;
    max-height:360px;
    border-radius:7px;
    border:1px solid var(--border-soft);
    display:block;
    background:#000;
  }
  .video-title{
    font-size:16.5px;
    font-weight:700;
    color:var(--ink);
    margin-top:8px;
    line-height:1.35;
  }
  .embed .post-video{max-height:200px;margin-top:6px;}
  .embed .video-title{font-size:14.5px;margin-top:6px;}

  /* ---------- video detail page (YouTube-style layout) ---------- */
  .video-detail .video-title{
    font-size:21px;
    margin-top:10px;
  }
  .video-detail-meta{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-top:12px;
  }
  .video-detail-meta .actionbar{margin-top:0;flex:none;gap:20px;}
  .video-detail-meta .actbtn{font-size:15.5px;gap:7px;padding:5px 7px;position:relative;}
  .video-detail-meta .actbtn svg{width:18px;height:18px;}
  .video-detail-meta .actbtn + .actbtn::before{
    content:'';
    position:absolute;
    left:-10px;
    top:50%;
    transform:translateY(-50%);
    width:1px;
    height:14px;
    background:var(--border);
  }

  .actionbar{display:flex;gap:16px;margin-top:8px;}
  .actbtn{
    display:flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;
    color:var(--muted);font-size:13.5px;font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;
    padding:0;border-radius:5px;transition:color .12s ease;
  }
  .actbtn svg{width:14px;height:14px;transition:transform .15s ease;}
  .actbtn-icon{
    display:flex;align-items:center;justify-content:center;
    width:28px;height:28px;border-radius:100px;flex:none;
    transition:background .12s ease;
  }
  .actbtn:hover .actbtn-icon{background:var(--hover-bg);}
  .actbtn.like:hover{color:var(--like);}
  .actbtn.like:hover .actbtn-icon{background:var(--like-soft);}
  .actbtn.repost:hover{color:var(--accent2);}
  .actbtn.repost:hover .actbtn-icon{background:var(--accent2-soft);}
  .actbtn.share:hover{color:var(--accent);}
  .actbtn.share:hover .actbtn-icon{background:var(--accent-soft);}
  .actbtn.comment:hover{color:var(--accent);}
  .actbtn.comment:hover .actbtn-icon{background:var(--accent-soft);}
  .actbtn.like.active{color:var(--like);}
  .actbtn.like.active svg{fill:var(--like);transform:scale(1.08);}
  .actbtn.repost.active{color:var(--accent2);}
  .actbtn.repost.active svg{transform:rotate(90deg);}

  /* ---------- embedded thread ---------- */
  .embed{margin-top:9px;border-left:2px solid var(--accent);border-radius:0 6px 6px 0;background:var(--accent-soft);padding:8px 10px 9px 10px;cursor:pointer;transition:filter .12s ease;}
  .embed:hover{filter:brightness(0.95);}
  .embed .embed{border-left-color:var(--accent2);background:var(--accent2-soft);}
  .embed .embed .embed{border-left-color:var(--border);background:var(--paper);}
  .embed-flag{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
  .embed .embed .embed-flag{color:var(--accent2);}
  .embed .embed .embed .embed-flag{color:var(--muted);}
  .embed-flag svg{width:10px;height:10px;}
  .embed .post-tags{margin-bottom:5px;}
  .embed .avatar{width:26px;height:26px;border-radius:100px;}
  .embed .displayname{font-size:14px;}
  .embed .handle{font-size:12.5px;}
  .embed .postdate{font-size:12px;}
  .embed .post-body{font-size:14.5px;margin-top:5px;}
  .embed .post-image{max-height:180px;margin-top:6px;}
  .embed .actionbar{display:none;}

  /* ---------- video-embed: compact "watch streaming video" card ---------- */
  .video-embed-row{display:flex;gap:10px;}
  .video-embed-thumb{
    width:84px;height:52px;border-radius:6px;object-fit:cover;flex:none;
    background:var(--tag-bg);border:1px solid var(--border-soft);
  }
  .video-embed-meta{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:5px;}
  .video-embed-title{
    font-size:14.5px;font-weight:700;color:var(--ink);line-height:1.3;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .video-embed-channel{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
  .video-embed-avatar{width:18px;height:18px;border-radius:100px;object-fit:cover;flex:none;}
  .video-embed-channel .displayname{font-size:12.5px;}
  .video-embed-channel .handle{font-size:12px;}
  .video-embed-channel .postdate{font-size:12px;margin-top:0;}

  .sentinel{height:1px;}
  .loadingrow{padding:16px;text-align:center;color:var(--muted);font-size:13.5px;font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;}

  .toast{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);
    background:#181B22;color:#fff;font-size:14px;padding:9px 16px;border-radius:100px;
    opacity:0;transition:all .25s ease;pointer-events:none;white-space:nowrap;z-index:50;
    box-shadow:0 6px 20px rgba(0,0,0,0.25);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ---------- streaming grid ---------- */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
    gap:20px 16px;
    padding:16px;
  }
  .card{
    cursor:pointer;
    animation:fadein .25s ease;
  }
  .card-thumbwrap{
    position:relative;
    border-radius:9px;
    overflow:hidden;
    border:1px solid var(--border-soft);
    background:var(--tag-bg);
  }
  .card-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;transition:transform .2s ease;}
  .card:hover .card-thumb{transform:scale(1.03);}
  .card-tags{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;}
  .card-meta{display:flex;gap:8px;margin-top:8px;}
  .card-avatar{width:34px;height:34px;border-radius:100px;object-fit:cover;flex:none;border:1px solid var(--border-soft);}
  .card-title{font-size:14.8px;font-weight:700;color:var(--ink);line-height:1.32;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .card-sub{font-size:13px;color:var(--muted);margin-top:3px;font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;}

  /* ---------- masonry (Social tab, filtered to a MASONRY_TAGS tag) ---------- */
  .masonry-grid{
    column-count:3;
    column-gap:3px;
    padding:3px;
  }
  .masonry-item{
    display:block;
    width:100%;
    margin-bottom:3px;
    break-inside:avoid;
    -webkit-column-break-inside:avoid;
    cursor:pointer;
    border-radius:6px;
    overflow:hidden;
    background:var(--tag-bg);
    animation:fadein .25s ease;
  }
  .masonry-item img{width:100%;display:block;transition:opacity .12s ease;}
  .masonry-item:hover img{opacity:0.85;}
  @media (max-width:560px){ .masonry-grid{column-count:2;} }

  /* ---------- detail page ---------- */
  .detailwrap{padding:0 0 6px 0;}
  .backbtn{
    display:flex;align-items:center;gap:6px;
    padding:13px 16px;
    font-size:14px;font-weight:700;color:var(--muted);
    cursor:pointer;background:var(--surface);border-bottom:1px solid var(--border-soft);
  }
  .backbtn:hover{color:var(--accent);}
  .backbtn svg{width:13px;height:13px;}
  .detail-post{cursor:default;}
  .detail-post .post-body{font-size:16.5px;}

  /* ---------- replies (detail page only, see renderReplySection) ---------- */
  /* a reply is a full .post row (see renderPost reuse in repliesListHtml),
     so there's very little bespoke CSS needed here — just the composer
     and the "replying to" context label above a comment's own detail page */
  .reply-context-label{
    padding:12px 16px 0 16px;
    font-size:13px;color:var(--muted);
  }
  .reply-context-label span{color:var(--accent);}
  .comments-section{border-top:1px solid var(--border-soft);}
  .comment-composer{display:flex;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border-soft);}
  .comment-composer .avatar{width:36px;height:36px;}
  .comment-composer-field{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
  /* align-items:flex-end above keeps the Reply button hugging the right
     (unlike the main composer's full-width Post button), but that also
     shrinks any un-sized child to its content — force these two back to
     full width explicitly rather than losing the right-aligned button */
  .comment-composer-field textarea,
  .comment-composer-field .composer-media-picker,
  .comment-composer-field .composer-media-preview{
    width:100%;
  }
  .comment-composer-field textarea{
    border:1px solid var(--border);
    border-radius:8px;
    background:var(--surface);
    color:var(--ink);
    font-size:14.5px;
    font-family:inherit;
    line-height:1.5;
    padding:9px 11px;
    resize:vertical;
    min-height:38px;
    outline:none;
  }
  .comment-composer-field textarea:focus{border-color:var(--accent);}
  .comment-submit-btn{
    padding:6px 15px;border-radius:100px;font-size:13.5px;font-weight:700;
    cursor:pointer;border:1px solid var(--accent);background:var(--accent);color:#fff;
    transition:opacity .12s ease;
  }
  .comment-submit-btn:disabled{opacity:0.4;cursor:default;}

  .comments-empty{padding:24px 16px;text-align:center;color:var(--muted);font-size:14px;}

  /* ---------- user profile page ---------- */
  /* Always rendered, banner or not — a bannerless profile just gets a flat
     --tag-bg rectangle instead of an <img>, so it's the same layout either
     way (see renderProfilePage). The avatar sits in its bottom-left corner
     and hangs slightly past the bottom edge (profile-banner-avatar's
     negative margin-bottom); the handle/name sit to its right, still on

  .profile-banner-wrap{
    position:relative;

  .profile-hero{padding:10px 16px 20px 16px;}
  /* Reserves space beside the avatar's overlapping bottom sliver (24px,
     matching profile-banner-avatar's overlap) so the verified badge lines

<script>
(function(){

// simple silhouette avatar shown for accounts with no avatarUrl set — not a
// hosted image, just an inline SVG data URI, so it always renders regardless
// of network conditions. Background is a square filling the whole viewBox
// (not a circle) since avatars render with all sorts of border-radius
// across the app — a circular disc left the corners transparent whenever
// an avatar wasn't cropped to a full circle, showing whatever was behind it.
const DEFAULT_AVATAR_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#AEB4BC"/><circle cx="50" cy="40" r="19" fill="#F4F5F7"/><path d="M50 62c-24 0-42 13-42 32v6h84v-6c0-19-18-32-42-32z" fill="#F4F5F7"/></svg>`;
const DEFAULT_AVATAR = `data:image/svg+xml,${encodeURIComponent(DEFAULT_AVATAR_SVG)}`;

let TAGS = []; // populated from GET /api/tags

const SECTIONS = [
  {id:"social", label:"Social", icon:`<path d="M17 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"/><circle cx="10" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>`},
  {id:"news", label:"News", icon:`<rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 8h10M7 12h10M7 16h6"/>`},
  {id:"streaming", label:"Streaming", icon:`<rect x="2" y="5" width="20" height="14" rx="2"/><path d="M10 9l5 3-5 3V9z"/>`}
];

// Streaming-only sub-tabs. Only "vids" has anything behind it right now
// (the Video model) — the rest are roadmap placeholders (see README).
const STREAMING_SUBTABS = [
  {id:"vids", label:"Vids"},
  {id:"livestreams", label:"Livestreams"},
  {id:"shows", label:"Shows/Movies"},
  {id:"music", label:"Music"}
];

// Filtering the Social tab (only — never News/Streaming) down to exactly
// one of these tags swaps the normal post list for an image-only masonry
// grid instead — see renderMasonryGrid and its call site in renderMain.
const MASONRY_TAGS = ["Digital Art", "Traditional Art", "Photography"];

// Everywhere tags are listed (search filter, composer, profile filter),
// the MASONRY_TAGS art tags are grouped first with a thin divider before
// the rest — no text label, just a visual break.
function orderedTagGroups(){
  const art = MASONRY_TAGS.filter(t => TAGS.includes(t));
  const rest = TAGS.filter(t => !MASONRY_TAGS.includes(t));
  return {art, rest};
}
function tagPillsHtml(renderItemFn){
  const {art, rest} = orderedTagGroups();
  const divider = (art.length && rest.length) ? '<div class="tag-divider"></div>' : '';
  return art.map(renderItemFn).join('') + divider + rest.map(renderItemFn).join('');
}
const API_BASE = "http://localhost:4000/api";

function pickImage(seed){ return `https://picsum.photos/seed/${seed}/640/360`; }
function fmtDate(d){
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + ' · ' +
         d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
}
function tagPills(tags){
  return `<div class="post-tags">${tags.map(t=>`<span class="tag-pill">${t}</span>`).join('')}</div>`;
}

// every seeded user has their own real avatarUrl (or none at all, which
// falls back to DEFAULT_AVATAR — see its comment above) — this is also
// where that fallback gets applied, once, rather than at every render site
function normalizePost(p){
  if(!p) return null;
  return {
    ...p,
    date: new Date(p.createdAt),
    reposted: false,
    author: {...p.author, avatar: p.author.avatar || DEFAULT_AVATAR},
    embed: normalizePost(p.embed),
    embedVideo: normalizeEmbedVideo(p.embedVideo),
    // a comment is a post with parent/parentVideo set — the single post
    // or video it's replying to, shown above it on its own detail page
    // (see renderParentContext)
    parent: normalizePost(p.parent),
    parentVideo: normalizeEmbedVideo(p.parentVideo)
  };
}

// compact video summary nested inside a post's `embedVideo` (repost of a
// streaming video) — not a full Video, just enough for the watch-card
function normalizeEmbedVideo(v){
  if(!v) return null;
  return {
    ...v,
    date: new Date(v.createdAt),
    channel: {...v.channel, avatar: v.channel.avatar || DEFAULT_AVATAR}
  };
}

function normalizeVideo(v){
  if(!v) return null;
  return {
    ...v,
    date: new Date(v.createdAt),
    channel: {...v.channel, avatar: v.channel.avatar || DEFAULT_AVATAR}
  };
}

function normalizeProfileUser(u){
  if(!u) return null;
  return {...u, avatar: u.avatar || DEFAULT_AVATAR};
}

// which seeded account the frontend is "logged in" as (see currentUser.js
// backend-side — there's no real auth) — fetched once at boot, used only
// to decide whether to show owner-only UI (the profile edit icon)
let currentUserHandle = null;
async function fetchCurrentUser(){
  try{
    const res = await fetch(`${API_BASE}/users/me`);
    const data = await res.json();
    currentUserHandle = data.handle;
    // a direct #user/you permalink load can render the profile before this
    // resolves — re-render so the edit icon still shows up in that case
    if(view === 'profile') renderMain();
  }catch(e){
    console.error(e);
  }
}

async function fetchTags(){
  try{
    const res = await fetch(`${API_BASE}/tags`);
    TAGS = await res.json();
  }catch(e){
    console.error(e);
  }
  renderTagDropdown();
  renderComposer();
}

// ---- app state ----
let currentTab = 'social';
let streamingSubTab = 'vids'; // 'vids' | 'livestreams' | 'shows' | 'music'
let selectedTag = null;
let searchQuery = "";
let view = 'feed'; // 'feed' | 'detail' | 'profile'
let detailType = 'post'; // 'post' | 'video'
let detailId = null;
let detailPost = null;
let detailVideo = null;
let detailUser = null;
let searchDebounceTimer;

// ---- replies to whatever post/video is currently open in the detail
// view — a comment IS a post (see normalizePost's parent/parentVideo),
// so this is fetched via the exact same GET /api/posts list endpoint the
// main feed uses, just filtered by parentId/parentVideoId instead of
// section, and rendered with the exact same renderPost() as anywhere
// else — a reply is fully interactive (likeable, repostable, itself
// replyable) for free. Only one detail item is ever open at a time, so a
// single set of module-level state is enough — reset on every
// openPostDetail/openVideoDetail call (see fetchReplies callers).
let replies = [];
let repliesNextCursor = null;
let repliesLoading = false;
let repliesNoMore = false;
let repliesFetchSeq = 0;
let replyDraft = "";
let replyFile = null; // { name, type, dataUrl } | null — same shape as composerFile/repostFile
let replySubmitting = false;

// ---- profile page's own post search (separate from the main feed's
// tab-scoped search above — filters/sorts/paginates a single user's own
// content, mixing Posts and Videos into one list; see fetchProfilePosts) --
const PROFILE_POST_TYPES = [
  {id:'social', label:'Social'},
  {id:'news', label:'News'},
  {id:'video', label:'Vids'}
];
// Empty set = no filter = show every content type. Selecting a pill
// restricts to just the selected type(s) — see renderProfileTypeRowHtml.
let profileFilterTypes = new Set();
let profileTag = null;
let profileQuery = "";
let profileSort = 'recent'; // 'recent' | 'likes'
let profileItems = [];
let profileOffset = 0;
let profileLoading = false;
let profileNoMore = false;
let profileFetchSeq = 0;
let profileSearchDebounceTimer;

// ---- private messaging: conversation previews (sidebar + full list page)
// and the currently-open thread, if any ----
let conversations = [];
let conversationsLoaded = false;
let messageThreadUser = null; // {handle,name,avatar}
let messageThreadItems = [];
let messageComposerText = "";
let messageSending = false;

// ---- posts for the current tab/filter, paginated from the API ----
let posts = [];
let nextCursor = null;
let loading = false;
let noMore = false;
let fetchSeq = 0;

async function fetchPosts(reset){
  if(!reset && (loading || noMore)) return;
  const seq = ++fetchSeq;
  if(reset){ posts = []; nextCursor = null; noMore = false; }
  loading = true;
  loadingRow.style.display = 'block';
  renderMain();
  try{
    const params = new URLSearchParams({section: currentTab});
    if(selectedTag) params.set('tag', selectedTag);
    if(searchQuery) params.set('q', searchQuery);
    if(nextCursor) params.set('cursor', nextCursor);
    const res = await fetch(`${API_BASE}/posts?${params}`);
    const data = await res.json();
    if(seq !== fetchSeq) return; // a newer request superseded this one
    posts = posts.concat(data.posts.map(normalizePost));
    nextCursor = data.nextCursor;
    noMore = !nextCursor;
  }catch(e){
    console.error(e);
    if(seq === fetchSeq) showToast('Could not reach the server');
  }finally{
    if(seq === fetchSeq){
      loading = false;
      loadingRow.style.display = 'none';
      renderMain();
    }
  }
}

// ---- videos for the Streaming tab, paginated from the API — entirely
// separate from `posts`, since streaming content isn't a post anymore ----
let videos = [];
let videoNextCursor = null;
let videoLoading = false;
let videoNoMore = false;
let videoFetchSeq = 0;

async function fetchVideos(reset){
  if(!reset && (videoLoading || videoNoMore)) return;
  const seq = ++videoFetchSeq;
  if(reset){ videos = []; videoNextCursor = null; videoNoMore = false; }
  videoLoading = true;
  loadingRow.style.display = 'block';
  renderMain();
  try{
    const params = new URLSearchParams();
    if(selectedTag) params.set('tag', selectedTag);
    if(searchQuery) params.set('q', searchQuery);
    if(videoNextCursor) params.set('cursor', videoNextCursor);
    const res = await fetch(`${API_BASE}/videos?${params}`);
    const data = await res.json();
    if(seq !== videoFetchSeq) return;
    videos = videos.concat(data.videos.map(normalizeVideo));
    videoNextCursor = data.nextCursor;
    videoNoMore = !videoNextCursor;
  }catch(e){
    console.error(e);
    if(seq === videoFetchSeq) showToast('Could not reach the server');
  }finally{

// used by tab-switch, search, and tag-filter handlers so they don't need to
// know which resource the current tab is backed by
function refetchCurrentTab(reset){
  if(currentTab === 'streaming') fetchVideos(reset);
  else fetchPosts(reset);
}

// ---- replies — kind is 'post' or 'video', matching the action bar's
// data-kind convention. A reply is just a Post, so fetching a thread is
// the exact same GET /api/posts list request as the feed, filtered by
// parentId/parentVideoId instead of section (see routes/posts.js).
async function fetchReplies(kind, id, reset){
  if(!reset && (repliesLoading || repliesNoMore)) return;
  const seq = ++repliesFetchSeq;
  if(reset){ replies = []; repliesNextCursor = null; repliesNoMore = false; }
  repliesLoading = true;
  renderRepliesList();
  try{
    const params = new URLSearchParams();
    params.set(kind==='video' ? 'parentVideoId' : 'parentId', id);
    if(repliesNextCursor) params.set('cursor', repliesNextCursor);
    const res = await fetch(`${API_BASE}/posts?${params}`);
    const data = await res.json();
    if(seq !== repliesFetchSeq) return;
    replies = replies.concat(data.posts.map(normalizePost));
    repliesNextCursor = data.nextCursor;
    repliesNoMore = !repliesNextCursor;
  }catch(e){
    console.error(e);
    if(seq === repliesFetchSeq) showToast('Could not reach the server');
  }finally{
    if(seq === repliesFetchSeq){
      repliesLoading = false;
      renderRepliesList();
    }
  }
}

// creates the reply as a real post (see POST /:id/comment in
// routes/posts.js and routes/videos.js) — same author/likes/reposts
// machinery as anything else, just parented to whatever's being replied to
function replyValid(){
  return replyDraft.trim().length > 0 || !!replyFile;
}
async function submitReply(kind, id){
  if(!replyValid() || replySubmitting) return;
  replySubmitting = true;
  updateReplySubmitBtn();
  try{
    let imageUrl, videoUrl;
    if(replyFile){
      const url = await uploadFile(replyFile);
      if(isVideoFile(replyFile)) videoUrl = url;
      else imageUrl = url;
    }
    const res = await fetch(`${API_BASE}/${kind==='video'?'videos':'posts'}/${id}/comment`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ body: replyDraft.trim(), imageUrl, videoUrl })
    });
    if(!res.ok){
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error || 'Failed to post comment');
    }
    const created = normalizePost(await res.json());
    replies.push(created);
    // bump the visible count on the item itself, same as like/repost's
    // optimistic local update elsewhere
    const item = kind==='video' ? findVideo(id) : findPost(id);
    if(item) item.replies = (item.replies||0) + 1;
    replyDraft = "";
    replyFile = null;
    replySubmitting = false;
    renderMain();
  }catch(e){
    console.error(e);
    replySubmitting = false;
    updateReplySubmitBtn();
    showToast(e.message || 'Could not reach the server');
  }
}

// ---- profile page's own post search — merges Posts and Videos from a
// single author/channel into one sorted, paginated list via the backend's
// GET /users/:handle/posts. Deliberately does NOT go through renderMain():
// the toolbar (search input, tag/sort selects, type pills) is built once
// by renderProfilePage and would lose focus/cursor position if rebuilt on
// every keystroke, so only #profilePostsList is touched here — same reason
// the main feed's search field lives outside the reactive feed body.
function normalizeProfileItem(item){
  return item.type === 'video'
    ? {...normalizeVideo(item), type: 'video'}
    : {...normalizePost(item), type: 'post'};
}
function renderProfileItem(item){
  return item.type === 'video' ? renderCard(item) : renderPost(item);
}
function profilePostsListEl(){
  return document.getElementById('profilePostsList');
}
function renderProfilePostsList(){
  const el = profilePostsListEl();
  if(!el) return; // navigated away before this resolved
  if(!profileItems.length){
    el.innerHTML = profileLoading ? '' : `<div class="empty-state"><b>No posts found</b>Try a different filter or search.</div>`;
    return;
  }
  el.innerHTML = profileItems.map(renderProfileItem).join('');
}

async function fetchProfilePosts(reset){
  if(!detailUser) return;
  if(!reset && (profileLoading || profileNoMore)) return;
  const seq = ++profileFetchSeq;
  if(reset){ profileItems = []; profileOffset = 0; profileNoMore = false; }
  profileLoading = true;
  loadingRow.style.display = 'block';
  if(reset) renderProfilePostsList(); // clear stale results immediately on a new filter/search
  try{
    const params = new URLSearchParams();
    if(profileFilterTypes.size > 0){
      params.set('types', [...profileFilterTypes].join(','));
    }
    if(profileTag) params.set('tag', profileTag);
    if(profileQuery) params.set('q', profileQuery);
    if(profileSort === 'likes') params.set('sort', 'likes');
    params.set('offset', profileOffset);
    const res = await fetch(`${API_BASE}/users/${detailUser.handle}/posts?${params}`);
    const data = await res.json();
    if(seq !== profileFetchSeq) return;
    profileItems = profileItems.concat(data.items.map(normalizeProfileItem));
    profileOffset = data.nextOffset;
    profileNoMore = data.nextOffset == null;
  }catch(e){
    console.error(e);
    if(seq === profileFetchSeq) showToast('Could not reach the server');
  }finally{
    if(seq === profileFetchSeq){
      profileLoading = false;
      loadingRow.style.display = 'none';
      renderProfilePostsList();
    }
  }
}

function renderDmPreviewItem(conv){

    <div class="dm-preview-item" data-dm-handle="${conv.user.handle}">

function updateThreadSendBtn(){
  const btn = document.getElementById('threadSendBtn');
  if(!btn) return;
  btn.disabled = !messageComposerText.trim() || messageSending;
}

// .thread-page has no height of its own by default — it's sized here to
// fill the rest of the viewport below whatever's rendered above it (the
// sticky topbar's collapsed height plus the backbtn varies, so this reads
// the actual offset rather than guessing a fixed constant), which is what
// lets .thread-messages' flex:1 + justify-content:flex-end bottom-align a
// short conversation against the composer instead of leaving it floating
// at the top with empty space below.
function sizeThreadPage(){
  const el = document.querySelector('.thread-page');
  if(!el) return;
  const top = el.getBoundingClientRect().top;
  el.style.minHeight = `calc(100vh - ${Math.round(top)}px)`;
}

function scrollThreadToBottom(){
  window.scrollTo({top: document.body.scrollHeight, behavior: 'instant'});
}

// static page, no data to load — same "back returns to whatever tab you
// were on" convention as openProfile/openAffiliatePage
async function openMessagesPage({push=true}={}){
  if(view === 'feed') savedFeedScrollY = window.scrollY;
  view = 'messages';
  renderTabs();
  renderSubTabs();
  renderComposer();
  if(push) history.pushState({messages:true}, '', '#messages');
  renderMain();
  window.scrollTo({top:0, behavior:'instant'});
  await fetchConversations();
  if(view === 'messages') renderMain();
}

async function openMessageThread(handle, {push=true}={}){
  if(view === 'feed') savedFeedScrollY = window.scrollY;
  messageThreadUser = null;
  messageThreadItems = [];
  messageComposerText = "";
  messageSending = false;
  view = 'messageThread';
  renderTabs();
  renderSubTabs();
  renderComposer();
  if(push) history.pushState({thread:handle}, '', `#messages/${handle}`);
  renderMain();
  window.scrollTo({top:0, behavior:'instant'});
  try{
    const res = await fetch(`${API_BASE}/messages/${handle}`);
    if(!res.ok) throw new Error('not found');
    const data = await res.json();
    if(view !== 'messageThread') return; // navigated away before this resolved
    messageThreadUser = {...data.user, avatar: data.user.avatar || DEFAULT_AVATAR};
    messageThreadItems = data.messages;
    renderMain();
    scrollThreadToBottom();
    // opening the thread just marked the other person's messages read
    // server-side — refresh the (now-stale) unread badges elsewhere
    fetchConversations();
  }catch(e){
    console.error(e);
    showToast('Could not load that conversation');
  }
}

async function sendThreadMessage(){
  const text = messageComposerText.trim();
  if(!text || messageSending || !messageThreadUser) return;
  const handle = messageThreadUser.handle;
  messageSending = true;
  renderMain();
  updateThreadSendBtn();
  try{
    const res = await fetch(`${API_BASE}/messages/${handle}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({body: text}),
    });
    if(!res.ok) throw new Error('failed to send');
    const sent = await res.json();
    if(messageThreadUser && messageThreadUser.handle === handle){
      messageThreadItems.push(sent);
      messageComposerText = "";
    }
  }catch(e){
    console.error(e);
    showToast('Could not send message');
  }finally{
    messageSending = false;
    if(messageThreadUser && messageThreadUser.handle === handle){
      renderMain();
      scrollThreadToBottom();
      document.getElementById('threadComposerInput')?.focus();
    }
  }
}

// ---- post composer (and, on the Streaming tab, the video-upload form) ----
let composerOpen = false;
let composerBody = ""; // doubles as the video description on Streaming
let composerTags = [];
let composerFile = null; // { name, type, dataUrl } | null
let composerVideoTitle = ""; // only used/required in Streaming mode
let composerSubmitting = false;

const MAX_UPLOAD_BYTES = 20 * 1024 * 1024;
const ICON_MEDIA = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10.5" r="1.5"/><path d="M21 15l-5-5L5 19"/></svg>`;

function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function attr(s){
  return String(s).replace(/"/g,'&quot;');
}
function isVideoFile(f){
  return !!f && f.type.startsWith('video/');
}

// shown next to "Tags" in any composer — makes the unmet-requirement state
// explicit instead of just reading "0/3", which was easy to miss
function tagCountLabel(tags){
  return tags.length
    ? `<span class="composer-tag-count">${tags.length}/3</span>`
    : `<span class="composer-tag-required">Must select at least one tag</span>`;
}

function composerValid(){
  if(currentTab === 'streaming'){
    return !!composerFile && isVideoFile(composerFile) && composerVideoTitle.trim().length>0 &&
      composerTags.length>=1 && composerTags.length<=3;
  }
  return composerTags.length>=1 && composerTags.length<=3;
}
function composerValidationMessage(){
  if(currentTab === 'streaming'){
    if(!composerFile || !isVideoFile(composerFile)) return 'Attach a video to upload';
    if(!composerVideoTitle.trim()) return 'Give your video a title';
    if(composerTags.length<1) return 'Pick at least one tag';
    return '';
  }
  if(composerTags.length<1) return 'Pick at least one tag to post';
  return '';
}

function resetComposer(){
  composerOpen = false;
  composerBody = "";
  composerTags = [];
  composerFile = null;
  composerVideoTitle = "";
  composerSubmitting = false;
  shellEl.classList.remove('show-mobile-composer'); // no-op on desktop
}

function updateComposerSubmitBtn(){
  const btn = document.getElementById('composerSubmitBtn');
  if(!btn) return;
  btn.disabled = !composerValid() || composerSubmitting;
  btn.title = composerSubmitting ? '' : composerValidationMessage();
  const verb = currentTab === 'streaming' ? 'Upload' : 'Post';
  btn.textContent = composerSubmitting ? `${verb}ing…` : verb;
}

function renderComposer(focusBody){
  // News has no composer at all — posting there requires being a verified
  // news provider, which almost nobody is and which you'd only apply for
  // once, so it doesn't get a permanent front-and-center prompt here
  // anymore (see the sidebar's Affiliate page instead).
  if(currentTab === 'news'){
    composerEl.innerHTML = '';
    return;
  }

  const sectionLabel = SECTIONS.find(s=>s.id===currentTab).label;

  if(!composerOpen){
    composerEl.innerHTML = `
      <div class="composer-collapsed" data-action="expand-composer">
        <img class="composer-avatar" src="${DEFAULT_AVATAR}"/>
        <div class="composer-fake-input">${currentTab==='streaming' ? 'Upload a streaming video…' : `Share something in ${sectionLabel}…`}</div>
      </div>`;
    return;
  }

  if(currentTab === 'streaming'){
    renderVideoComposer(focusBody);
    return;
  }

  const mediaBlock = composerFile ? `
    <div class="composer-media-preview">
      ${isVideoFile(composerFile)
        ? `<video src="${composerFile.dataUrl}" controls></video>`
        : `<img src="${composerFile.dataUrl}"/>`}
      <button type="button" class="composer-media-remove" data-action="remove-media" aria-label="Remove media">${ICON_X}</button>
    </div>
  ` : `
    <label class="composer-media-picker" data-action="pick-file" title="Add a photo or video">${ICON_MEDIA} Add a photo or video</label>
  `;

  composerEl.innerHTML = `
    <div class="composer-expanded">
      <textarea class="composer-body" id="composerBodyInput" placeholder="Share something in ${sectionLabel}…">${escapeHtml(composerBody)}</textarea>
      <div>
        <div class="composer-tags-label">Tags ${tagCountLabel(composerTags)}</div>
        <div class="composer-tags">
          ${tagPillsHtml(t=>`<div class="tag-dropdown-item ${composerTags.includes(t)?'selected':''} ${(!composerTags.includes(t) && composerTags.length>=3)?'disabled':''}" data-ctag="${t}">${t}</div>`)}
        </div>
      </div>
      ${mediaBlock}
      <input type="file" id="composerFileInput" accept="image/*,video/*" hidden/>
      <div class="composer-actions">
        <button type="button" class="composer-btn" data-action="cancel-composer">Cancel</button>
        <button type="button" class="composer-btn primary" id="composerSubmitBtn" data-action="submit-composer" title="${attr(composerValidationMessage())}" ${(!composerValid()||composerSubmitting)?'disabled':''}>${composerSubmitting?'Posting…':'Post'}</button>
      </div>
    </div>`;

  const bodyInput = document.getElementById('composerBodyInput');
  if(focusBody){
    bodyInput.focus();
    bodyInput.setSelectionRange(bodyInput.value.length, bodyInput.value.length);
  }
  bodyInput.addEventListener('input', (e)=>{ composerBody = e.target.value; });

  document.getElementById('composerFileInput').addEventListener('change', (e)=>{
    const file = e.target.files[0];
    e.target.value = '';
    if(!file) return;
    if(file.size > MAX_UPLOAD_BYTES){
      showToast('That file is too large (20MB max)');
      return;
    }
    const reader = new FileReader();
    reader.onload = ()=>{
      composerFile = { name: file.name, type: file.type, dataUrl: reader.result };
      renderComposer();
    };
    reader.readAsDataURL(file);
  });
}

// Streaming tab's composer: a proper video upload, not a lightweight post —
// video + title are required, description and tags round it out.
function renderVideoComposer(focusBody){
  const mediaBlock = composerFile ? `
    <div class="composer-media-preview">
      <video src="${composerFile.dataUrl}" controls></video>
      <button type="button" class="composer-media-remove" data-action="remove-media" aria-label="Remove video">${ICON_X}</button>
    </div>
  ` : `
    <label class="composer-media-picker" data-action="pick-file" title="Add a video">${ICON_MEDIA} Add a video to upload</label>
  `;

  composerEl.innerHTML = `
    <div class="composer-expanded">
      ${mediaBlock}
      <input type="file" id="composerFileInput" accept="video/*" hidden/>
      <input type="text" class="composer-text-input" id="composerVideoTitleInput" placeholder="Video title (required)" value="${attr(composerVideoTitle)}"/>
      <textarea class="composer-body" id="composerBodyInput" placeholder="Describe your video (optional)">${escapeHtml(composerBody)}</textarea>
      <div>
        <div class="composer-tags-label">Tags ${tagCountLabel(composerTags)}</div>
        <div class="composer-tags">

composerEl.addEventListener('click', (e)=>{
  if(e.target.closest('[data-action="expand-composer"]')){
    composerOpen = true;
    renderComposer(true);
    return;
  }
  if(e.target.closest('[data-action="cancel-composer"]')){
    resetComposer();
    renderComposer();
    return;
  }
  if(e.target.closest('[data-action="pick-file"]')){
    document.getElementById('composerFileInput').click();
    return;
  }
  if(e.target.closest('[data-action="remove-media"]')){
    composerFile = null;
    composerVideoTitle = '';
    renderComposer();
    return;
  }
  const tagItem = e.target.closest('[data-ctag]');
  if(tagItem){
    const t = tagItem.getAttribute('data-ctag');
    if(composerTags.includes(t)){
      composerTags = composerTags.filter(x=>x!==t);
    } else if(composerTags.length<3){
      composerTags = [...composerTags, t];
    }
    renderComposer();
    return;
  }
  if(e.target.closest('[data-action="submit-composer"]')){
    submitComposer();
  }
});

async function uploadFile(file){
  const res = await fetch(`${API_BASE}/uploads`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      mimeType: file.type,
      dataBase64: file.dataUrl.split(',')[1]
    })
  });
  if(!res.ok){
    const err = await res.json().catch(()=>({}));
    throw new Error(err.error || 'Failed to upload file');
  }
  return (await res.json()).url;
}

async function submitComposer(){
  if(!composerValid() || composerSubmitting) return;
  composerSubmitting = true;
  updateComposerSubmitBtn();

  if(currentTab === 'streaming'){
    try{
      const videoUrl = await uploadFile(composerFile);
      const res = await fetch(`${API_BASE}/videos`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          videoUrl,
          videoTitle: composerVideoTitle.trim(),
          description: composerBody.trim(),
          tags: composerTags
        })
      });
      if(!res.ok){
        const err = await res.json().catch(()=>({}));
        throw new Error(err.error || 'Failed to upload video');
      }
      const created = normalizeVideo(await res.json());
      resetComposer();
      renderComposer();
      if(view==='feed'){
        videos.unshift(created);
        renderMain();
        window.scrollTo({top:0, behavior:'smooth'});
      }
      showToast('Video uploaded');
    }catch(e){
      console.error(e);
      composerSubmitting = false;
      updateComposerSubmitBtn();
      showToast(e.message || 'Could not reach the server');
    }
    return;
  }

  try{
    let imageUrl, videoUrl;
    if(composerFile){
      const url = await uploadFile(composerFile);
      if(isVideoFile(composerFile)) videoUrl = url;
      else imageUrl = url;
    }
    const res = await fetch(`${API_BASE}/posts`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        section: currentTab,
        body: composerBody.trim(),
        tags: composerTags,
        imageUrl,
        videoUrl
      })
    });
    if(!res.ok){
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error || 'Failed to post');
    }
    const created = normalizePost(await res.json());
    resetComposer();
    renderComposer();
    if(view==='feed'){
      posts.unshift(created);
      renderMain();
      window.scrollTo({top:0, behavior:'smooth'});
    }
    showToast('Posted');
  }catch(e){
    console.error(e);
    composerSubmitting = false;
    updateComposerSubmitBtn();
    showToast(e.message || 'Could not reach the server');
  }
}

// pan/zoom crop math — the image is displayed at baseScale (the scale at
// which its SHORTER side exactly fills the square viewport) times the
// zoom slider, so it always fully covers the viewport regardless of pan;
// pan is clamped so the image can never reveal empty space at the edges
function computeCropGeometry(){
  const {naturalWidth, naturalHeight} = avatarCropFile;
  const baseScale = AVATAR_CROP_VIEWPORT / Math.min(naturalWidth, naturalHeight);
  const totalScale = baseScale * avatarCropZoom;
  const displayedW = naturalWidth * totalScale;
  const displayedH = naturalHeight * totalScale;
  const maxPanX = Math.max(0, (displayedW - AVATAR_CROP_VIEWPORT) / 2);
  const maxPanY = Math.max(0, (displayedH - AVATAR_CROP_VIEWPORT) / 2);
  return {totalScale, displayedW, displayedH, maxPanX, maxPanY};
}
function clampCropPan(){
  const {maxPanX, maxPanY} = computeCropGeometry();
  avatarCropPan.x = Math.max(-maxPanX, Math.min(maxPanX, avatarCropPan.x));
  avatarCropPan.y = Math.max(-maxPanY, Math.min(maxPanY, avatarCropPan.y));
}
function applyCropImageStyle(){
  const img = document.getElementById('avatarCropImage');
  if(!img) return;
  const {displayedW, displayedH} = computeCropGeometry();
  img.style.width = `${displayedW}px`;
  img.style.height = `${displayedH}px`;
  img.style.left = `${(AVATAR_CROP_VIEWPORT - displayedW)/2 + avatarCropPan.x}px`;
  img.style.top = `${(AVATAR_CROP_VIEWPORT - displayedH)/2 + avatarCropPan.y}px`;
}

function renderAvatarCropView(){
  profileEditModalEl.innerHTML = `
    <div class="modal-dialog profile-edit-dialog" role="dialog" aria-modal="true">
      <div class="modal-header">
        <div class="modal-title">Crop your photo</div>

      </div>

        <img id="avatarCropImage" src="${avatarCropFile.dataUrl}"/>
      </div>
      <input type="range" class="avatar-crop-zoom" id="avatarCropZoomSlider" min="1" max="3" step="0.01" value="${avatarCropZoom}"/>
      <div class="avatar-crop-hint">Drag to reposition, use the slider to zoom</div>
      <div class="composer-actions">
        <button type="button" class="composer-btn" data-action="cancel-avatar-crop">Cancel</button>
        <button type="button" class="composer-btn primary" id="avatarCropConfirmBtn" data-action="confirm-avatar-crop" ${avatarUploading?'disabled':''}>${avatarUploading?'Uploading…':'Use photo'}</button>
      </div>
    </div>`;

  applyCropImageStyle();

  const viewport = document.getElementById('avatarCropViewport');
  let dragState = null;
  viewport.addEventListener('pointerdown', (e)=>{
    dragState = {startX: e.clientX, startY: e.clientY, startPanX: avatarCropPan.x, startPanY: avatarCropPan.y};
    viewport.setPointerCapture(e.pointerId);
  });
  viewport.addEventListener('pointermove', (e)=>{
    if(!dragState) return;
    avatarCropPan.x = dragState.startPanX + (e.clientX - dragState.startX);
    avatarCropPan.y = dragState.startPanY + (e.clientY - dragState.startY);
    clampCropPan();
    applyCropImageStyle();
  });
  viewport.addEventListener('pointerup', ()=>{ dragState = null; });
  viewport.addEventListener('pointercancel', ()=>{ dragState = null; });

  document.getElementById('avatarCropZoomSlider').addEventListener('input', (e)=>{
    avatarCropZoom = parseFloat(e.target.value);
    clampCropPan();
    applyCropImageStyle();
  });
}

function renderCroppedAvatarDataUrl(){
  // 400 mirrors the backend's own AVATAR_SIZE (avatarImage.js) — exporting
  // near that size keeps the upload small. The backend still authoritatively
  // resizes/converts regardless, this is just to avoid uploading a full
  // multi-megapixel original for no reason.
  const OUTPUT_SIZE = 400;
  const {totalScale, displayedW, displayedH} = computeCropGeometry();
  const originX = (AVATAR_CROP_VIEWPORT - displayedW) / 2 + avatarCropPan.x;
  const originY = (AVATAR_CROP_VIEWPORT - displayedH) / 2 + avatarCropPan.y;
  const srcX = -originX / totalScale;
  const srcY = -originY / totalScale;
  const srcSize = AVATAR_CROP_VIEWPORT / totalScale;

  const canvas = document.createElement('canvas');
  canvas.width = OUTPUT_SIZE;
  canvas.height = OUTPUT_SIZE;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(document.getElementById('avatarCropImage'), srcX, srcY, srcSize, srcSize, 0, 0, OUTPUT_SIZE, OUTPUT_SIZE);
  return canvas.toDataURL('image/jpeg', 0.92);
}

async function confirmAvatarCrop(){
  if(avatarUploading || !avatarCropFile) return;
  avatarUploading = true;
  const btn = document.getElementById('avatarCropConfirmBtn');
  if(btn){ btn.disabled = true; btn.textContent = 'Uploading…'; }

  try{
    const dataUrl = renderCroppedAvatarDataUrl();
    const res = await fetch(`${API_BASE}/users/me/avatar`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({dataBase64: dataUrl.split(',')[1]}),
    });
    if(!res.ok) throw new Error('Failed to upload avatar');
    const data = await res.json();
    if(detailUser) detailUser.avatar = data.avatar;
    avatarCropFile = null;
    avatarUploading = false;
    renderProfileEditModal(); // back to the main form, now showing the new avatar
    renderMain(); // the profile page behind the modal should pick it up too
    showToast('Profile picture updated');
  }catch(e){
    console.error(e);
    avatarUploading = false;
    showToast('Could not upload that photo');
    renderAvatarCropView(); // stay on the crop view, re-enabling the button
  }
}

async function saveProfileEdit(){
  if(profileEditSaving) return;
  if(!profileEditName.trim()){
    showToast('Name cannot be empty');
    return;
  }
  for(const l of profileEditLinks){
    if(!l.label.trim() || !l.url.trim()){
      showToast('Each link needs a label and a URL');
      return;
    }
  }
  profileEditSaving = true;
  const btn = document.getElementById('profileEditSaveBtn');
  if(btn){ btn.disabled = true; btn.textContent = 'Saving…'; }
  try{
    const res = await fetch(`${API_BASE}/users/me`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: profileEditName.trim(), bio: profileEditBio.trim(), links: profileEditLinks}),
    });
    if(!res.ok){
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error || 'Failed to save');
    }
    const updated = await res.json();
    if(detailUser && detailUser.handle === updated.handle){
      Object.assign(detailUser, updated, {avatar: updated.avatar || DEFAULT_AVATAR});
    }
    profileEditOpen = false;
    profileEditSaving = false;
    renderProfileEditModal();
    renderMain();
    showToast('Profile updated');
  }catch(e){
    console.error(e);
    profileEditSaving = false;
    showToast(e.message || 'Could not save profile');
    if(btn){ btn.disabled = false; btn.textContent = 'Save'; }
  }
}

  if(e.target.closest('[data-action="save-profile-edit"]')){ saveProfileEdit(); return; }
  if(e.target.closest('[data-action="cancel-avatar-crop"]')){ avatarCropFile = null; renderProfileEditModal(); return; }
